<style>
    /* ... (resto del CSS invariato) ... */

    /* GRIGLIA RISULTATI FISSA 3x2 */
    #search-results { 
        width: 100%; max-width: 1200px; display: grid; 
        grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; 
    }
    
    .result-card { 
        background: #0d0d0d; border: 1px solid #222; padding: 12px; height: 90px;
        display: flex; flex-direction: column; justify-content: space-between; position: relative;
    }

    /* IL NAVIGATORE (6° SLOT) */
    .nav-panel { 
        border: 2px solid var(--amber); /* Bordo ambra per distinguerlo */
        background: #111; 
        display: flex; align-items: center; justify-content: space-around; cursor: default; 
    }
    
    .nav-btn { 
        background: transparent; border: 1px solid var(--amber); color: var(--amber); 
        font-family: 'VT323'; font-size: 2rem; width: 40%; height: 80%; cursor: pointer; transition: 0.2s; 
    }
    
    .nav-btn:hover:not(:disabled) { background: var(--amber); color: #000; }
    .nav-btn:disabled { opacity: 0.2; cursor: not-allowed; border-color: #333; }
    
    .page-indicator { font-size: 0.8rem; color: #fff; text-align: center; }

    /* PULSANTI LOAD */
    .load-btns { display: flex; gap: 5px; }
    .load-btns button { 
        flex: 1; background: #222; color: var(--amber); border: 1px solid #333; 
        font-family: 'VT323'; cursor: pointer; padding: 4px;
    }
    .load-btns button:hover { background: var(--amber); color: #000; }
</style>

<script>
    // Database locale dei risultati correnti
    let searchResults = []; 
    let currentPage = 0;    // Pagina corrente (mostra 5 risultati)

    // Sostituisci interamente la funzione search nel tuo script
    async function search() {
        const bar = document.getElementById('search-bar');
        const q = document.getElementById('query').value;
        if(!q) return;
        
        // Attiva effetto scansione
        bar.classList.add('loading');
        
        try {
            const res = await fetch('/search?q=' + encodeURIComponent(q));
            
            // Riceviamo TUTTI i risultati dal server (es. 20 tracce)
            searchResults = await res.json(); 
            
            // Resettiamo alla prima pagina
            currentPage = 0; 
            renderPage();
            
        } catch(e) {
            console.error("Errore ricerca:", e);
        } finally {
            // Piccolo delay per fluidità
            setTimeout(() => bar.classList.remove('loading'), 800);
        }
    }

    // Funzione aggiornata per la paginazione 5+1
    function renderPage() {
        const container = document.getElementById('search-results');
        let html = '';
        
        // 1. Mostra i 5 risultati reali della pagina corrente
        const start = currentPage * 5;
        const currentSet = searchResults.slice(start, start + 5);

        for(let i=0; i<5; i++) {
            if(currentSet[i]) {
                html += `
                <div class="result-card">
                    <div style="font-size:0.75rem; color:#fff; overflow:hidden; white-space:nowrap;">${currentSet[i].title}</div>
                    <div class="load-btns">
                        <button onclick="load('${currentSetSet[i].id}', '${currentSetSet[i].title.replace(/'/g,"")}', 'A')">LOAD A</button>
                        <button onclick="load('${currentSetSet[i].id}', '${currentSetSet[i].title.replace(/'/g,"")}', 'B')">LOAD B</button>
                    </div>
                </div>`;
            } else {
                // Slot vuoti se ci sono meno di 5 risultati
                html += `<div class="result-card" style="opacity:0.2; border-style:dashed;">NO SIGNAL</div>`;
            }
        }

        // 2. Il 6° slot diventa il Navigatore < >
        // Calcolo logico corretto:
        const canPrev = currentPage > 0;
        const canNext = (currentPage + 1) * 5 < searchResults.length; // Controlla se ci sono risultati oltre questa pagina

        html += `
        <div class="result-card nav-panel">
            <button class="nav-btn" onclick="changePage(-1)" ${!canPrev ? 'disabled' : ''}>&lt;</button>
            <div class="page-indicator">PAGE<br>${currentPage + 1}</div>
            <button class="nav-btn" onclick="changePage(1)" ${!canNext ? 'disabled' : ''}>&gt;</button>
        </div>`;

        container.innerHTML = html;
    }

    // Funzione per cambiare pagina
    function changePage(dir) {
        currentPage += dir;
        renderPage();
    }
</script>
