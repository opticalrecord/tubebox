<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUTUBOX DJ - 6-SLOT PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --amber: #ffb000; --bg: #050505; --panel: #111; --silver: #999; }
        body { background: var(--bg); color: var(--amber); font-family: 'VT323', monospace; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        /* SEARCH */
        .search-container { 
            width: 100%; max-width: 1200px; background: #0a0a0a; padding: 12px; border: 1px solid #222; display: flex; gap: 10px; margin-bottom: 10px;
        }
        input[type=text] { flex: 1; background: transparent; border: none; color: #fff; padding: 8px; font-family: 'VT323'; font-size: 1.4rem; outline: none; }

        .btn-search {
            background: var(--amber); border: none; padding: 0 30px; font-family: 'VT323'; 
            cursor: pointer; font-weight: bold; font-size: 1.2rem; position: relative; overflow: hidden;
        }
        .btn-search::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.4); }
        .btn-search.loading::after { left: 100%; transition: left 0.6s ease-in-out; }

        /* GRIGLIA FISSA 3x2 */
        #search-results { 
            width: 100%; max-width: 1200px; 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: repeat(2, 100px);
            gap: 10px; margin-bottom: 20px; 
        }
        .result-card { background: #0a0a0a; border: 1px solid #222; padding: 10px; display: flex; flex-direction: column; justify-content: center; }
        .empty-slot { border: 1px dashed #222; opacity: 0.3; color: #222; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }

        /* CONSOLE */
        .dj-setup { display: grid; grid-template-columns: 1fr 350px 1fr; gap: 20px; background: #0d0d0d; padding: 30px; border: 2px solid #222; width: 100%; max-width: 1200px; }
        .deck { background: var(--panel); padding: 25px; border: 1px solid #222; text-align: center; position: relative; display: flex; flex-direction: column; align-items: center; }
        
        .slider-track-v { position: relative; width: 40px; background: #000; border: 1px solid #222; display: flex; align-items: center; justify-content: center; }
        .custom-slider-v { appearance: none; -webkit-appearance: none; background: transparent; transform: rotate(90deg); cursor: pointer; outline: none; position: absolute; width: 220px; z-index: 2; }
        .custom-slider-v::-webkit-slider-thumb { -webkit-appearance: none; width: 28px; height: 40px; background: var(--silver); border-radius: 0; }

        .platter { width: 220px; height: 220px; border-radius: 50%; border: 10px solid #050505; background-color: #000; background-size: cover; animation: spin 3.3s linear infinite; animation-play-state: paused; mask-image: radial-gradient(circle, transparent 10%, black 11%); -webkit-mask-image: radial-gradient(circle, transparent 10%, black 11%); }
        .platter.playing { animation-play-state: running; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .mixer { display: flex; flex-direction: column; align-items: center; justify-content: space-between; }
        .logo-box { text-align: center; width: 100%; }
        .logo-main { font-size: 1.5rem; color: #fff; letter-spacing: 8px; margin: 0; }
        .logo-sub { font-size: 5rem; color: var(--amber); font-weight: bold; line-height: 0.8; margin: 0; }

        .vu-container { width: 90%; background: #000; padding: 10px; border: 1px solid #222; margin: 10px 0; }
        .vu-row { display: flex; gap: 2px; height: 10px; margin: 4px 0; }
        .led { flex: 1; background: #0a0a0a; transition: 0.05s; }

        .volume-section { display: flex; gap: 60px; }
        .btn-play { width: 160px; padding: 15px; background: #111; color: #444; border: 1px solid #222; cursor: pointer; font-family: 'VT323'; font-size: 1.4rem; margin-top: 25px; }
        .btn-play.active { color: #0f0; border-color: #0f0; }

        #xfader { width: 100%; appearance: none; height: 4px; background: #222; margin-top: 20px; }
        #xfader::-webkit-slider-thumb { appearance: none; width: 40px; height: 28px; background: var(--silver); }

        .yt-hidden { position: absolute; top: -9999px; visibility: hidden; }
        #overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    </style>
</head>
<body>

    <div id="overlay" onclick="unlock()"><h1>[ CLICCA PER ATTIVARE ]</h1></div>

    <div class="search-container">
        <input type="text" id="query" placeholder="CERCA TRACCIA">
        <button id="search-btn" class="btn-search" onclick="search()">CERCA</button>
    </div>

    <div id="search-results">
        </div>

    <div class="dj-setup">
        <div class="deck">
            <div id="title-A" style="font-size:0.8rem; margin-bottom:10px; height:20px; color:#0f0; background:#000; width:100%; overflow:hidden;">DECK A</div>
            <div id="platter-A" class="platter"></div>
            <div style="position: absolute; right: 15px; top: 75px;">
                <div class="slider-track-v" style="height: 240px;">
                    <input type="range" class="custom-slider-v" min="0.5" max="2.0" step="0.01" value="1.0" oninput="updatePitch('A', this.value)">
                </div>
                <div id="val-A" style="font-size:0.8rem; color:#fff; text-align:center; margin-top:5px;">1.0x</div>
            </div>
            <button id="btn-play-A" class="btn-play" onclick="toggleDeck('A')">START / STOP</button>
        </div>

        <div class="mixer">
            <div class="logo-box">
                <div class="logo-main">YOUTUBOX</div>
                <div class="logo-sub">DJ</div>
            </div>
            <div class="vu-container">
                <div class="vu-row" id="vu-L"></div>
                <div class="vu-row" id="vu-R"></div>
            </div>
            <div class="volume-section">
                <div class="slider-track-v" style="height:180px;">
                    <input type="range" id="faderA" class="custom-slider-v" style="width:160px;" min="0" max="100" value="100" oninput="updateMixer()">
                </div>
                <div class="slider-track-v" style="height:180px;">
                    <input type="range" id="faderB" class="custom-slider-v" style="width:160px;" min="0" max="100" value="100" oninput="updateMixer()">
                </div>
            </div>
            <input type="range" id="xfader" min="0" max="100" value="50" oninput="updateMixer()">
        </div>

        <div class="deck">
            <div id="title-B" style="font-size:0.8rem; margin-bottom:10px; height:20px; color:#0f0; background:#000; width:100%; overflow:hidden;">DECK B</div>
            <div id="platter-B" class="platter"></div>
            <div style="position: absolute; right: 15px; top: 75px;">
                <div class="slider-track-v" style="height: 240px;">
                    <input type="range" class="custom-slider-v" min="0.5" max="2.0" step="0.01" value="1.0" oninput="updatePitch('B', this.value)">
                </div>
                <div id="val-B" style="font-size:0.8rem; color:#fff; text-align:center; margin-top:5px;">1.0x</div>
            </div>
            <button id="btn-play-B" class="btn-play" onclick="toggleDeck('B')">START / STOP</button>
        </div>
    </div>

    <div class="yt-hidden">
        <div id="playerA"></div>
        <div id="playerB"></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let playerA, playerB, pitchA = 1, pitchB = 1;

        function onYouTubeIframeAPIReady() {
            playerA = new YT.Player('playerA', { events: { 'onStateChange': (e) => syncUI('A', e.data) } });
            playerB = new YT.Player('playerB', { events: { 'onStateChange': (e) => syncUI('B', e.data) } });
            renderEmptySlots();
        }

        function renderEmptySlots() {
            const container = document.getElementById('search-results');
            container.innerHTML = Array(6).fill('<div class="result-card empty-slot">EMPTY SLOT</div>').join('');
        }

        function syncUI(deck, state) {
            const p = document.getElementById('platter-' + deck);
            const b = document.getElementById('btn-play-' + deck);
            state === 1 ? (p.classList.add('playing'), b.classList.add('active')) : (p.classList.remove('playing'), b.classList.remove('active'));
        }

        async function search() {
            const btn = document.getElementById('search-btn');
            const q = document.getElementById('query').value;
            if(!q) return;
            btn.classList.add('loading');
            try {
                const res = await fetch('/search?q=' + encodeURIComponent(q));
                const data = await res.json();
                let html = '';
                for(let i=0; i<6; i++) {
                    if(data[i]) {
                        html += `<div class="result-card">
                            <div style="height:15px; overflow:hidden; font-size:0.7rem; color:#fff;">${data[i].title}</div>
                            <div style="display:flex; gap:5px; margin-top:8px;">
                                <button onclick="load('${data[i].id}', '${data[i].title.replace(/'/g,"")}', 'A')" style="flex:1; background:var(--amber); border:none; cursor:pointer; font-family:'VT323';">LOAD A</button>
                                <button onclick="load('${data[i].id}', '${data[i].title.replace(/'/g,"")}', 'B')" style="flex:1; background:var(--amber); border:none; cursor:pointer; font-family:'VT323';">LOAD B</button>
                            </div>
                        </div>`;
                    } else {
                        html += `<div class="result-card empty-slot">NO DATA</div>`;
                    }
                }
                document.getElementById('search-results').innerHTML = html;
            } finally { setTimeout(() => btn.classList.remove('loading'), 600); }
        }

        function load(id, title, deck) {
            const p = (deck === 'A' ? playerA : playerB);
            p.cueVideoById(id);
            document.getElementById('title-' + deck).innerText = title.toUpperCase();
            document.getElementById('platter-' + deck).style.backgroundImage = `url('https://img.youtube.com/vi/${id}/hqdefault.jpg')`;
        }

        function toggleDeck(deck) {
            const p = (deck === 'A' ? playerA : playerB);
            p.getPlayerState() === 1 ? p.pauseVideo() : p.playVideo();
        }

        function updatePitch(deck, val) {
            const p = (deck === 'A' ? playerA : playerB);
            const s = parseFloat(val);
            if(deck === 'A') pitchA = s; else pitchB = s;
            document.getElementById('val-' + deck).innerText = s.toFixed(2) + 'x';
            if(p.setPlaybackRate) p.setPlaybackRate(s);
            document.getElementById('platter-' + deck).style.animationDuration = (3.3 / s) + 's';
        }

        function updateMixer() {
            const x = document.getElementById('xfader').value;
            const fA = 100 - document.getElementById('faderA').value; // Invertito: 0 html = 100 real
            const fB = 100 - document.getElementById('faderB').value; 
            if(playerA.setVolume) playerA.setVolume(Math.min(100, (100 - x) * 2) * (fA / 100));
            if(playerB.setVolume) playerB.setVolume(Math.min(100, x * 2) * (fB / 100));
        }

        function initVU() {
            ['vu-L', 'vu-R'].forEach(id => {
                const c = document.getElementById(id);
                c.innerHTML = Array(30).fill('<div class="led"></div>').join('');
            });
        }

        function updateVU() {
            const now = Date.now();
            const fA = (100 - document.getElementById('faderA').value)/100;
            const fB = (100 - document.getElementById('faderB').value)/100;
            const x = document.getElementById('xfader').value / 100;

            const volA = (playerA && playerA.getPlayerState() === 1) ? fA * Math.max(0, 1 - x * 2 + 1) : 0;
            const volB = (playerB && playerB.getPlayerState() === 1) ? fB * Math.max(0, x * 2 - 1 + 1) : 0;

            // Oscillatori a tempo di pitch
            const beatA = volA > 0 ? (Math.sin(now * 0.01 * pitchA) * 0.3 + 0.7) : 0;
            const beatB = volB > 0 ? (Math.sin(now * 0.01 * pitchB) * 0.3 + 0.7) : 0;

            [ {id: 'vu-L', v: (volA * beatA) + (volB * 0.2)}, {id: 'vu-R', v: (volB * beatB) + (volA * 0.2)} ].forEach(ch => {
                const leds = document.getElementById(ch.id).querySelectorAll('.led');
                const p = ch.v * 30;
                leds.forEach((l, i) => {
                    const act = i < p;
                    l.style.background = act ? (i < 18 ? '#0f0' : (i < 25 ? '#ff0' : '#f00')) : '#0a0a0a';
                    l.style.boxShadow = act ? `0 0 5px ${i < 18 ? '#0f0' : '#f00'}` : 'none';
                });
            });
            requestAnimationFrame(updateVU);
        }

        function unlock() { document.getElementById('overlay').style.display='none'; initVU(); updateVU(); }
    </script>
</body>
</html>
