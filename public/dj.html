<style>
    /* ... (resto del CSS invariato) ... */

    .nav-panel { 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        border: 1px solid var(--amber); 
        gap: 15px;
        overflow: hidden; /* Impedisce la fuoriuscita */
    }

    .nav-btn { 
        background: transparent; 
        border: none; 
        color: var(--amber); 
        font-family: 'VT323'; 
        font-size: 3.5rem; /* Ridotto leggermente per stabilità */
        line-height: 1; 
        cursor: pointer; 
        transition: 0.2s; 
        padding: 0 10px;
        display: flex;
        align-items: center;
    }

    .nav-btn:hover:not(:disabled) { 
        color: #fff; 
        text-shadow: 0 0 10px var(--amber); 
    }

    /* Fix Cursore: Rimuove il simbolo sbarrato sui tasti cliccabili */
    .nav-btn:disabled { 
        opacity: 0.1; 
        cursor: not-allowed; 
    }

    .page-indicator { 
        font-size: 2.2rem; 
        color: #fff; 
        min-width: 40px; 
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
    }
</style>

<script>
    // Funzione aggiornata per forzare il rendering dei tasti
    function renderPage() {
        const container = document.getElementById('search-results');
        let html = '';
        const start = currentPage * 5;
        const currentSet = searchResults.slice(start, start + 5);

        for(let i=0; i<5; i++) {
            if(currentSet[i]) {
                html += `<div class="result-card">
                    <div style="font-size:0.75rem; color:#fff; overflow:hidden; white-space:nowrap;">${currentSet[i].title}</div>
                    <div class="load-btns">
                        <button onclick="load('${currentSet[i].id}', '${currentSet[i].title.replace(/'/g,"")}', 'A')">A</button>
                        <button onclick="load('${currentSet[i].id}', '${currentSet[i].title.replace(/'/g,"")}', 'B')">B</button>
                    </div>
                </div>`;
            } else {
                html += `<div class="result-card" style="opacity:0.2; border-style:dashed;">NO DATA</div>`;
            }
        }

        // Calcolo logico per le pagine
        const canPrev = currentPage > 0;
        const canNext = (currentPage + 1) * 5 < searchResults.length;

        // Pannello Navigazione con allineamento corretto
        html += `
        <div class="result-card nav-panel">
            <button class="nav-btn" onclick="changePage(-1)" ${!canPrev ? 'disabled' : ''}>&lt;</button>
            <div class="page-indicator">${currentPage + 1}</div>
            <button class="nav-btn" onclick="changePage(1)" ${!canNext ? 'disabled' : ''}>&gt;</button>
        </div>`;

        container.innerHTML = html;
    }
</script>
