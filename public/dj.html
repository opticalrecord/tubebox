<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUTUBOX DJ - INDUSTRIAL PRO STATION</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --amber: #ffb000; --bg: #050505; --panel: #1a1a1a; --silver: #ccc; --led-dim: #1a1a1a; }
        body { background: var(--bg); color: var(--amber); font-family: 'VT323', monospace; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; user-select: none; }
        
        /* SEARCH BAR BREATHING EFFECT */
        @keyframes breathingBar {
            0%, 100% { border-color: #333; box-shadow: 0 0 5px rgba(255,255,255,0.1); }
            50% { border-color: #eee; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        }
        .search-container { 
            width: 100%; max-width: 1200px; background: #111; padding: 12px; border-radius: 8px; 
            border: 2px solid #333; display: flex; gap: 10px; animation: breathingBar 3s infinite ease-in-out; margin-bottom: 15px;
        }
        input[type=text] { flex: 1; background: transparent; border: none; color: #fff; padding: 8px; font-family: 'VT323'; font-size: 1.4rem; outline: none; }
        input[type=text]::placeholder { color: #444; }

        #search-results { width: 100%; max-width: 1200px; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .result-card { background: #111; border: 1px solid #333; padding: 10px; border-radius: 4px; transition: 0.2s; }
        .result-card:hover { border-color: var(--amber); }

        /* DJ CONSOLE MAIN STRUCTURE */
        .dj-setup { display: grid; grid-template-columns: 1fr 350px 1fr; gap: 20px; background: #151515; padding: 30px; border-radius: 15px; border: 5px solid #333; width: 100%; max-width: 1200px; box-shadow: inset 0 0 100px #000; }
        
        /* DECK DESIGN */
        .deck { background: var(--panel); padding: 25px; border-radius: 10px; border: 2px solid #222; text-align: center; position: relative; display: flex; flex-direction: column; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* UNIFIED INDUSTRIAL SLIDER (PITCH & VOLUME) */
        .slider-track-v { position: relative; width: 45px; background: #000; border-radius: 4px; border: 2px solid #333; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .custom-slider-v { appearance: none; -webkit-appearance: none; background: transparent; transform: rotate(90deg); cursor: pointer; outline: none; position: absolute; }
        
        /* Slider Thumb (Silver Knob) */
        .custom-slider-v::-webkit-slider-thumb { -webkit-appearance: none; width: 25px; height: 45px; background: var(--silver); border: 2px solid #555; border-radius: 3px; box-shadow: 0 0 15px #000; cursor: ns-resize; border-top: 4px solid #fff; border-bottom: 4px solid #777; }

        .platter { 
            width: 230px; height: 230px; border-radius: 50%; border: 14px solid #111; 
            background-color: #080808; background-size: cover; background-position: center;
            animation: spin 3.3s linear infinite; animation-play-state: paused;
            mask-image: radial-gradient(circle, transparent 10%, black 11%);
            -webkit-mask-image: radial-gradient(circle, transparent 10%, black 11%);
            box-shadow: 0 0 30px #000;
        }
        .platter.playing { animation-play-state: running; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* MIXER CENTER SECTION */
        .mixer { display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 100%; }
        
        .mixer-header { text-align: center; width: 100%; margin-bottom: 5px; }
        .logo-main { font-size: 1.1rem; color: #fff; letter-spacing: 6px; margin: 0; opacity: 0.8; }
        .logo-sub { font-size: 4.5rem; color: var(--amber); font-weight: bold; line-height: 0.75; margin: 0; text-shadow: 0 0 25px rgba(255,176,0,0.4); }

        /* PROPORTIONAL VU METER */
        .vu-container { width: 95%; background: #000; padding: 12px; border: 2px solid #333; border-radius: 5px; margin-bottom: 20px; box-shadow: inset 0 0 10px #000; }
        .vu-row { display: flex; gap: 2px; height: 12px; margin: 5px 0; }
        .led { flex: 1; background: var(--led-dim); transition: 0.05s; border-radius: 1px; }

        /* VOLUME SECTION */
        .volume-section { display: flex; gap: 50px; margin-top: 10px; }

        .btn-play { width: 180px; padding: 18px; background: #222; color: #555; border: 2px solid #333; cursor: pointer; font-family: 'VT323'; font-size: 1.6rem; margin-top: 25px; transition: 0.1s; letter-spacing: 2px; }
        .btn-play.active { background: #1a331a; color: #0f0; border-color: #0f0; box-shadow: 0 0 20px rgba(0,255,0,0.3); }

        /* CROSSFADER */
        .xfader-container { width: 100%; padding: 20px 10px 0 10px; }
        #xfader { width: 100%; appearance: none; height: 8px; background: #111; border: 2px solid #333; border-radius: 10px; outline: none; }
        #xfader::-webkit-slider-thumb { appearance: none; width: 45px; height: 25px; background: var(--silver); border: 1px solid #777; border-radius: 2px; }

        .yt-hidden { position: absolute; top: -9999px; visibility: hidden; }
        #overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
    </style>
</head>
<body>

    <div id="overlay" onclick="unlock()">
        <h1 style="font-size: 3rem; letter-spacing: 10px;">[ POWER ON ]</h1>
        <p>INITIALIZING ANALOG CIRCUITRY...</p>
    </div>

    <div class="search-container">
        <input type="text" id="query" placeholder="CERCA TRACCIA NELL'ARCHIVIO...">
        <button onclick="search()" style="background:var(--amber); border:none; padding:0 30px; font-family:'VT323'; cursor:pointer; font-weight:bold; font-size: 1.2rem;">CERCA</button>
    </div>

    <div id="search-results"></div>

    <div class="dj-setup">
        
        <div class="deck">
            <div id="title-A" style="font-size:0.9rem; margin-bottom:15px; height:20px; color:#0f0; background:#000; width:100%; border:1px solid #333; line-height:20px;">DECK A: STANDBY</div>
            <div id="platter-A" class="platter"></div>
            
            <div style="position: absolute; right: 15px; top: 75px;">
                <div class="slider-track-v" style="height: 240px;">
                    <input type="range" class="custom-slider-v" style="width: 220px;" min="0.92" max="1.08" step="0.001" value="1" oninput="updatePitch('A', this.value)">
                </div>
                <div id="val-A" style="font-size:0.8rem; color:#fff; text-align:center; margin-top:8px; background:#000;">0.0%</div>
            </div>
            
            <button id="btn-play-A" class="btn-play" onclick="toggleDeck('A')">START · STOP</button>
        </div>

        <div class="mixer">
            <div class="mixer-header">
                <p class="logo-main">YOUTUBOX</p>
                <h1 class="logo-sub">DJ</h1>
            </div>

            <div class="vu-container">
                <div class="vu-row" id="vu-L"></div>
                <div class="vu-row" id="vu-R"></div>
            </div>

            <div class="volume-section">
                <div class="slider-track-v" style="height:210px;">
                    <input type="range" id="faderA" class="custom-slider-v" style="width:190px;" min="0" max="100" value="100" oninput="updateMixer()">
                </div>
                <div class="slider-track-v" style="height:210px;">
                    <input type="range" id="faderB" class="custom-slider-v" style="width:190px;" min="0" max="100" value="100" oninput="updateMixer()">
                </div>
            </div>

            <div class="xfader-container">
                <input type="range" id="xfader" min="0" max="100" value="50" oninput="updateMixer()">
            </div>
        </div>

        <div class="deck">
            <div id="title-B" style="font-size:0.9rem; margin-bottom:15px; height:20px; color:#0f0; background:#000; width:100%; border:1px solid #333; line-height:20px;">DECK B: STANDBY</div>
            <div id="platter-B" class="platter"></div>
            
            <div style="position: absolute; right: 15px; top: 75px;">
                <div class="slider-track-v" style="height: 240px;">
                    <input type="range" class="custom-slider-v" style="width: 220px;" min="0.92" max="1.08" step="0.001" value="1" oninput="updatePitch('B', this.value)">
                </div>
                <div id="val-B" style="font-size:0.8rem; color:#fff; text-align:center; margin-top:8px; background:#000;">0.0%</div>
            </div>
            
            <button id="btn-play-B" class="btn-play" onclick="toggleDeck('B')">START · STOP</button>
        </div>
    </div>

    <div class="yt-hidden">
        <div id="playerA"></div>
        <div id="playerB"></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let playerA, playerB;

        function onYouTubeIframeAPIReady() {
            playerA = new YT.Player('playerA', { 
                playerVars: { 'autoplay': 0, 'controls': 0, 'disablekb': 1 },
                events: { 'onStateChange': (e) => syncUI('A', e.data) } 
            });
            playerB = new YT.Player('playerB', { 
                playerVars: { 'autoplay': 0, 'controls': 0, 'disablekb': 1 },
                events: { 'onStateChange': (e) => syncUI('B', e.data) } 
            });
        }

        function syncUI(deck, state) {
            const platter = document.getElementById('platter-' + deck);
            const btn = document.getElementById('btn-play-' + deck);
            if (state === 1) { platter.classList.add('playing'); btn.classList.add('active'); }
            else { platter.classList.remove('playing'); btn.classList.remove('active'); }
        }

        async function search() {
            const q = document.getElementById('query').value;
            if(!q) return;
            const res = await fetch('/search?q=' + encodeURIComponent(q));
            const data = await res.json();
            document.getElementById('search-results').innerHTML = data.slice(0, 6).map(s => `
                <div class="result-card">
                    <div style="height:18px; overflow:hidden; font-weight:bold; margin-bottom:10px; color:#fff;">${s.title}</div>
                    <div style="display:flex; gap:5px;">
                        <button onclick="load('${s.id}', '${s.title.replace(/'/g,"")}', 'A')" style="flex:1; background:var(--amber); border:none; cursor:pointer; font-family:'VT323'; font-weight:bold; padding:5px;">LOAD A</button>
                        <button onclick="load('${s.id}', '${s.title.replace(/'/g,"")}', 'B')" style="flex:1; background:var(--amber); border:none; cursor:pointer; font-family:'VT323'; font-weight:bold; padding:5px;">LOAD B</button>
                    </div>
                </div>
            `).join('');
        }

        function load(id, title, deck) {
            const p = (deck === 'A' ? playerA : playerB);
            p.cueVideoById(id);
            document.getElementById('title-' + deck).innerText = title.toUpperCase();
            document.getElementById('platter-' + deck).style.backgroundImage = `url('https://img.youtube.com/vi/${id}/hqdefault.jpg')`;
        }

        function toggleDeck(deck) {
            const p = (deck === 'A' ? playerA : playerB);
            p.getPlayerState() === 1 ? p.pauseVideo() : p.playVideo();
        }

        function updatePitch(deck, val) {
            const p = (deck === 'A' ? playerA : playerB);
            const perc = ((val - 1) * 100).toFixed(1);
            document.getElementById('val-' + deck).innerText = (perc >= 0 ? '+' : '') + perc + '%';
            if(p.setPlaybackRate) {
                p.setPlaybackRate(parseFloat(val));
                document.getElementById('platter-' + deck).style.animationDuration = (3.3 / val) + 's';
            }
        }

        function updateMixer() {
            const x = document.getElementById('xfader').value;
            const fA = document.getElementById('faderA').value;
            const fB = document.getElementById('faderB').value;
            playerA.setVolume(Math.min(100, (100 - x) * 2) * (fA / 100));
            playerB.setVolume(Math.min(100, x * 2) * (fB / 100));
        }

        function initVU() {
            ['vu-L', 'vu-R'].forEach(id => {
                const c = document.getElementById(id);
                c.innerHTML = '';
                for(let i=0; i<30; i++) { // 30 segmenti per massima fluidità
                    const l = document.createElement('div');
                    l.className = 'led';
                    c.appendChild(l);
                }
            });
        }

        function updateVU() {
            const vA = (playerA && playerA.getPlayerState() === 1) ? document.getElementById('faderA').value/100 : 0;
            const vB = (playerB && playerB.getPlayerState() === 1) ? document.getElementById('faderB').value/100 : 0;
            // Simulazione segnale master con picchi casuali
            const master = Math.max(vA, vB) * (Math.random() * 0.4 + 0.65);
            ['vu-L', 'vu-R'].forEach(id => {
                const leds = document.getElementById(id).querySelectorAll('.led');
                leds.forEach((l, i) => {
                    const active = i < master * 30;
                    if(active) {
                        l.style.background = (i < 18 ? '#0f0' : (i < 25 ? '#ff0' : '#f00'));
                        l.style.boxShadow = `0 0 8px ${(i < 18 ? '#0f0' : (i < 25 ? '#ff0' : '#f00'))}`;
                    } else {
                        l.style.background = 'var(--led-dim)';
                        l.style.boxShadow = 'none';
                    }
                });
            });
            requestAnimationFrame(updateVU);
        }

        function unlock() { 
            document.getElementById('overlay').style.display='none'; 
            initVU(); 
            updateVU(); 
            if(playerA.playVideo) updateMixer();
        }
    </script>
</body>
</html>
