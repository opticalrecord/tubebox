<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YOUTUBOX DJ - MOBILE LANDSCAPE</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --amber: #ffb000; --bg: #050505; --panel: #0a0a0a; --silver: #cccccc; --led-off: #111; }
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            background: var(--bg); color: var(--amber); font-family: 'VT323', monospace; 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden;
        }

        /* MESSAGGIO ROTAZIONE SMARTPHONE */
        #rotate-message {
            display: none; position: fixed; inset: 0; background: #000; z-index: 10000;
            flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
        }
        .phone-icon { width: 50px; height: 80px; border: 3px solid var(--amber); border-radius: 5px; animation: rotate 2s infinite ease-in-out; position: relative; margin-bottom: 20px; }
        .phone-icon::after { content: ''; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); width: 10px; height: 10px; border-radius: 50%; background: var(--amber); }
        @keyframes rotate { 0% { transform: rotate(0deg); } 50% { transform: rotate(-90deg); } 100% { transform: rotate(-90deg); } }

        @media (orientation: portrait) and (max-width: 900px) {
            #rotate-message { display: flex; }
        }

        /* LAYOUT PRINCIPALE */
        .main-wrapper { display: flex; flex-direction: column; align-items: center; padding: 10px; width: 100%; }

        /* RICERCA COMPATTA PER MOBILE */
        .search-container { 
            width: 100%; max-width: 1100px; background: #000; padding: 5px 10px; 
            border: 1px solid #222; display: flex; gap: 10px; margin-bottom: 10px; 
            position: relative; overflow: hidden; 
        }
        .search-container.loading::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 176, 0, 0.2), transparent);
            animation: scan 2.5s infinite ease-in-out;
        }
        @keyframes scan { 0% { left: -100%; } 100% { left: 150%; } }
        input[type=text] { flex: 1; background: transparent; border: none; color: #fff; font-family: 'VT323'; font-size: 1.2rem; }
        .btn-search { background: var(--amber); border: none; padding: 5px 20px; font-family: 'VT323'; font-weight: bold; font-size: 1.1rem; cursor: pointer; }

        /* RISULTATI */
        #search-results { 
            width: 100%; max-width: 1100px; display: grid; 
            grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; 
        }
        .result-card { 
            background: #0d0d0d; border: 1px solid #222; padding: 8px; height: 75px; 
            display: flex; flex-direction: column; justify-content: space-between;
            animation: fadeIn 0.5s ease forwards; opacity: 0;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .load-btn { flex: 1; background: #1a1a1a; color: var(--amber); border: 1px solid #333; font-family: 'VT323'; cursor: pointer; font-size: 0.8rem; }

        /* CONSOLE DJ OTTIMIZZATA PER ORIZZONTALE */
        .dj-setup { 
            display: grid; grid-template-columns: 1.2fr 1fr 1.2fr; gap: 10px; 
            background: #000; padding: 15px; border: 1px solid #1a1a1a; width: 100%; max-width: 1100px; 
        }
        
        .deck { background: var(--panel); padding: 10px; border: 1px solid #151515; display: flex; align-items: center; justify-content: space-around; }
        .deck-center { display: flex; flex-direction: column; align-items: center; }

        /* SLIDERS MOBILE (PIÙ FACILI DA TOCCARE) */
        .slider-track-v { position: relative; width: 40px; height: 140px; background: #000; border: 1px solid #222; display: flex; justify-content: center; }
        .v-label { position: absolute; top: -18px; font-size: 0.7rem; color: #444; width: 100%; text-align: center; }

        .custom-slider-v { 
            appearance: none; background: transparent; transform: rotate(-90deg); 
            width: 140px; height: 40px; cursor: pointer; position: absolute; top: 50px; z-index: 5; margin: 0;
        }
        .custom-slider-v::-webkit-slider-thumb { appearance: none; width: 40px; height: 30px; background: var(--silver); border-radius: 0; border: none; }

        /* MIXER */
        .mixer { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .vu-container { width: 100%; background: #000; padding: 4px; border: 1px solid #222; margin-bottom: 10px; }
        .vu-row { display: flex; gap: 1px; height: 5px; margin: 2px 0; }
        .led { flex: 1; background: var(--led-off); }

        #xfader { width: 100%; appearance: none; height: 10px; background: #000; border: 1px solid #222; margin-top: 20px; }
        #xfader::-webkit-slider-thumb { appearance: none; width: 45px; height: 30px; background: var(--silver); border-radius: 0; cursor: pointer; }

        /* PIATTI PICCOLI PER MOBILE */
        .platter { 
            width: 110px; height: 110px; border-radius: 50%; border: 6px solid #111; 
            background-size: cover; background-position: center; 
            animation: spin 3.33s linear infinite; animation-play-state: paused; 
        }
        .platter.playing { animation-play-state: running; }
        
        .btn-play { width: 100%; padding: 8px; background: #111; color: #444; border: 1px solid #222; cursor: pointer; font-family: 'VT323'; font-size: 1rem; margin-top: 8px; }
        .btn-play.active { color: #0f0; border-color: #0f0; }

        .yt-hidden { position: absolute; top: -9999px; left: -9999px; }
        #overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
    </style>
</head>
<body>

    <div id="rotate-message">
        <div class="phone-icon"></div>
        <h2>RUOTA IL DISPOSITIVO</h2>
        <p>L'interfaccia DJ richiede la modalità orizzontale.</p>
    </div>

    <div id="overlay" onclick="unlock()">
        <h1 style="font-size: 3rem; margin:0;">YOUTUBOX DJ</h1>
        <p>[ TOCCO PER AVVIARE ]</p>
    </div>

    <div class="main-wrapper">
        <div class="search-container" id="search-bar">
            <input type="text" id="query" placeholder="CERCA MUSICA..." onkeypress="if(event.key==='Enter') search()">
            <button class="btn-search" onclick="search()">CERCA</button>
        </div>

        <div id="search-results"></div>

        <div class="dj-setup">
            <div class="deck">
                <div class="slider-track-v">
                    <div class="v-label">PITCH</div>
                    <input type="range" id="pitchA" class="custom-slider-v" min="0.9" max="1.1" step="0.01" value="1.0" oninput="updatePitch('A')">
                </div>
                <div class="deck-center">
                    <div id="title-A" style="font-size:0.6rem; color:#0f0; background:#000; width:100%; padding:2px; text-align:center; margin-bottom:5px; height:18px; overflow:hidden;">A - STANDBY</div>
                    <div id="platter-A" class="platter"></div>
                    <button id="btn-play-A" class="btn-play" onclick="toggleDeck('A')">START</button>
                </div>
            </div>

            <div class="mixer">
                <div style="font-size: 1.5rem; margin-bottom:5px;">MIXER</div>
                <div class="vu-container"><div class="vu-row" id="vu-L"></div><div class="vu-row" id="vu-R"></div></div>
                <div style="display:flex; gap:20px;">
                    <div class="slider-track-v">
                        <input type="range" id="faderA" class="custom-slider-v" min="0" max="100" value="100" oninput="updateMixer()">
                    </div>
                    <div class="slider-track-v">
                        <input type="range" id="faderB" class="custom-slider-v" min="0" max="100" value="100" oninput="updateMixer()">
                    </div>
                </div>
                <input type="range" id="xfader" min="0" max="100" value="50" oninput="updateMixer()">
            </div>

            <div class="deck">
                <div class="deck-center">
                    <div id="title-B" style="font-size:0.6rem; color:#0f0; background:#000; width:100%; padding:2px; text-align:center; margin-bottom:5px; height:18px; overflow:hidden;">B - STANDBY</div>
                    <div id="platter-B" class="platter"></div>
                    <button id="btn-play-B" class="btn-play" onclick="toggleDeck('B')">START</button>
                </div>
                <div class="slider-track-v">
                    <div class="v-label">PITCH</div>
                    <input type="range" id="pitchB" class="custom-slider-v" min="0.9" max="1.1" step="0.01" value="1.0" oninput="updatePitch('B')">
                </div>
            </div>
        </div>
    </div>

    <div class="yt-hidden"><div id="playerA"></div><div id="playerB"></div></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let playerA, playerB, searchResults = [], currentPage = 0;

        function onYouTubeIframeAPIReady() {
            playerA = new YT.Player('playerA', { events: { 'onStateChange': (e) => syncUI('A', e.data) } });
            playerB = new YT.Player('playerB', { events: { 'onStateChange': (e) => syncUI('B', e.data) } });
        }

        async function search() {
            const bar = document.getElementById('search-bar');
            const q = document.getElementById('query').value;
            if(!q) return;
            bar.classList.add('loading');
            try {
                const res = await fetch('/search?q=' + encodeURIComponent(q));
                searchResults = await res.json();
                currentPage = 0;
                renderPage();
            } catch(e) { console.error(e); }
            finally { setTimeout(() => bar.classList.remove('loading'), 1000); }
        }

        function renderPage() {
            const container = document.getElementById('search-results');
            const currentSet = searchResults.slice(currentPage * 3, (currentPage * 3) + 3);
            let html = '';
            currentSet.forEach((item, i) => {
                const t = item.title.replace(/'/g, "\\'");
                html += `<div class="result-card" style="animation-delay: ${i*0.1}s">
                    <div style="font-size:0.65rem; color:#fff; height:25px; overflow:hidden;">${item.title}</div>
                    <div style="display:flex; gap:4px;">
                        <button class="load-btn" onclick="load('${item.id}', '${t}', 'A')">A</button>
                        <button class="load-btn" onclick="load('${item.id}', '${t}', 'B')">B</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function load(id, title, deck) {
            const p = (deck === 'A' ? playerA : playerB);
            if(p && p.cueVideoById) {
                p.cueVideoById(id);
                document.getElementById('title-' + deck).innerText = title.toUpperCase();
                document.getElementById('platter-' + deck).style.backgroundImage = `url('https://img.youtube.com/vi/${id}/hqdefault.jpg')`;
            }
        }

        function updatePitch(deck) {
            const p = (deck === 'A' ? playerA : playerB);
            const rate = parseFloat(document.getElementById('pitch' + deck).value);
            if(p && p.setPlaybackRate) p.setPlaybackRate(rate);
        }

        function toggleDeck(deck) {
            const p = (deck === 'A' ? playerA : playerB);
            if(p && p.getPlayerState) p.getPlayerState() === 1 ? p.pauseVideo() : p.playVideo();
        }

        function syncUI(deck, state) {
            const platter = document.getElementById('platter-' + deck);
            const btn = document.getElementById('btn-play-' + deck);
            state === 1 ? (platter.classList.add('playing'), btn.classList.add('active')) : (platter.classList.remove('playing'), btn.classList.remove('active'));
        }

        function updateMixer() {
            if(!playerA || !playerB) return;
            const x = document.getElementById('xfader').value / 100;
            const volA = document.getElementById('faderA').value; 
            const volB = document.getElementById('faderB').value;
            if(playerA.setVolume) playerA.setVolume(volA * Math.min(1, (1-x)*2));
            if(playerB.setVolume) playerB.setVolume(volB * Math.min(1, x*2));
        }

        function updateVU() {
            const fA = document.getElementById('faderA').value / 100;
            const fB = document.getElementById('faderB').value / 100;
            const x = document.getElementById('xfader').value / 100;
            const isA = (playerA && playerA.getPlayerState && playerA.getPlayerState() === 1) ? 1 : 0;
            const isB = (playerB && playerB.getPlayerState && playerB.getPlayerState() === 1) ? 1 : 0;
            let master = (isA * fA * Math.min(1, (1-x)*2) + isB * fB * Math.min(1, x*2)) * (Math.sin(Date.now() * 0.015) * 0.2 + 0.8);
            ['vu-L', 'vu-R'].forEach((id, idx) => {
                const leds = document.getElementById(id).querySelectorAll('.led');
                const level = (idx === 0 ? master : master * 0.95) * 30;
                leds.forEach((l, i) => { l.style.background = i < level ? (i < 18 ? '#0f0' : (i < 25 ? '#ff0' : '#f00')) : 'var(--led-off)'; });
            });
            requestAnimationFrame(updateVU);
        }

        function unlock() { 
            document.getElementById('overlay').style.display = 'none';
            ['vu-L', 'vu-R'].forEach(id => { document.getElementById(id).innerHTML = Array(30).fill('<div class="led"></div>').join(''); });
            updateVU();
            updateMixer(); 
        }
    </script>
</body>
</html>
