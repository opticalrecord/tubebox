<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUTUBOX DJ - ULTIMATE CONSOLE</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --amber: #ffb000; --bg: #050505; --panel: #111; --silver: #999; --led-off: #0a0a0a; }
        
        * { box-sizing: border-box; }
        body { 
            background: var(--bg); color: var(--amber); font-family: 'VT323', monospace; 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; 
        }

        /* BARRA DI RICERCA CON EFFETTO LOADING TOTALE */
        .search-container { 
            width: 100%; max-width: 1200px; background: #0a0a0a; padding: 10px 15px; 
            border: 1px solid #222; display: flex; gap: 15px; margin-bottom: 15px;
            position: relative; overflow: hidden;
        }

        .search-container::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 40%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 176, 0, 0.3), transparent);
            pointer-events: none;
        }

        .search-container.loading::after { animation: scan 1s infinite linear; }
        @keyframes scan { from { left: -100%; } to { left: 150%; } }

        input[type=text] { 
            flex: 1; background: transparent; border: none; color: #fff; 
            font-family: 'VT323'; font-size: 1.5rem; outline: none; 
        }

        .btn-search { 
            background: var(--amber); border: none; padding: 0 40px; 
            font-family: 'VT323'; font-weight: bold; font-size: 1.3rem; cursor: pointer; 
        }

        /* GRIGLIA RISULTATI FISSA (3x2) */
        #search-results { 
            width: 100%; max-width: 1200px; display: grid; 
            grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; 
        }
        .result-card { 
            background: #0d0d0d; border: 1px solid #222; padding: 12px; height: 90px;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .empty-slot { border: 1px dashed #222; opacity: 0.2; justify-content: center; align-items: center; display: flex; }

        .load-btns { display: flex; gap: 5px; }
        .load-btns button { 
            flex: 1; background: #222; color: var(--amber); border: 1px solid #333; 
            font-family: 'VT323'; cursor: pointer; padding: 4px;
        }
        .load-btns button:hover { background: var(--amber); color: #000; }

        /* DJ CONSOLE SETUP */
        .dj-setup { 
            display: grid; grid-template-columns: 1fr 360px 1fr; gap: 20px; 
            background: #080808; padding: 40px; border: 3px solid #1a1a1a; 
            width: 100%; max-width: 1200px; border-radius: 4px;
        }

        .deck { 
            background: var(--panel); padding: 30px; border: 1px solid #222; 
            display: flex; flex-direction: column; align-items: center; position: relative;
        }

        /* PIATTI (PLATTERS) */
        .platter { 
            width: 220px; height: 220px; border-radius: 50%; border: 12px solid #000; 
            background-color: #050505; background-size: cover; background-position: center;
            animation: spin 3.33s linear infinite; animation-play-state: paused;
            mask-image: radial-gradient(circle, transparent 8%, black 9%);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .platter.playing { animation-play-state: running; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* SLIDERS PITCH E VOLUME */
        .slider-track-v { 
            position: relative; width: 45px; background: #000; border: 1px solid #222; 
            display: flex; align-items: center; justify-content: center; 
        }
        .custom-slider-v { 
            appearance: none; background: transparent; transform: rotate(90deg); 
            cursor: pointer; outline: none; position: absolute; width: 220px; z-index: 5; 
        }
        .custom-slider-v::-webkit-slider-thumb { 
            appearance: none; width: 30px; height: 45px; background: var(--silver); 
            border-radius: 2px; border: 1px solid #666;
        }

        /* MIXER CENTRALE */
        .mixer { display: flex; flex-direction: column; align-items: center; justify-content: space-between; }
        .logo-box { text-align: center; }
        .logo-sub { font-size: 5.5rem; color: var(--amber); font-weight: bold; line-height: 0.7; margin: 0; }
        
        .vu-container { 
            width: 95%; background: #000; padding: 12px; border: 2px solid #151515; margin: 20px 0; 
        }
        .vu-row { display: flex; gap: 2px; height: 12px; margin: 5px 0; }
        .led { flex: 1; background: var(--led-off); transition: 0.05s linear; }

        .volume-section { display: flex; gap: 60px; height: 200px; }

        .btn-play { 
            width: 160px; padding: 15px; background: #151515; color: #444; 
            border: 1px solid #222; cursor: pointer; font-family: 'VT323'; 
            font-size: 1.4rem; margin-top: 30px; transition: 0.2s;
        }
        .btn-play.active { color: #0f0; border-color: #0f0; box-shadow: 0 0 15px rgba(0,255,0,0.2); }

        #xfader { 
            width: 100%; appearance: none; height: 6px; background: #000; 
            border: 1px solid #222; outline: none; margin-top: 30px; 
        }
        #xfader::-webkit-slider-thumb { 
            appearance: none; width: 50px; height: 35px; background: var(--silver); border: 1px solid #666;
        }

        .yt-hidden { position: absolute; top: -9999px; }
        #overlay { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; justify-content: center; align-items: center; cursor: pointer; 
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="unlock()"><h1>[ CLICCA PER INIZIALIZZARE IL SISTEMA ]</h1></div>

    <div class="search-container" id="search-bar">
        <input type="text" id="query" placeholder="CERCA TRACCIA O ARTISTA...">
        <button id="search-btn" class="btn-search" onclick="search()">CERCA</button>
    </div>

    <div id="search-results">
        </div>

    <div class="dj-setup">
        <div class="deck">
            <div id="title-A" style="font-size:0.9rem; color:#0f0; background:#000; width:100%; padding:5px; text-align:center; margin-bottom:20px; border:1px solid #111;">DECK A - EMPTY</div>
            <div id="platter-A" class="platter"></div>
            <div style="position: absolute; right: 10px; top: 90px;">
                <div class="slider-track-v" style="height: 240px;">
                    <input type="range" class="custom-slider-v" min="0.5" max="2.0" step="0.01" value="1.0" oninput="updatePitch('A', this.value)">
                </div>
                <div id="val-A" style="color:#fff; text-align:center; margin-top:8px;">1.00x</div>
            </div>
            <button id="btn-play-A" class="btn-play" onclick="toggleDeck('A')">START / STOP</button>
        </div>

        <div class="mixer">
            <div class="logo-box">
                <div style="letter-spacing:10px; font-size:1.2rem; color:#fff;">YOUTUBOX</div>
                <div class="logo-sub">DJ</div>
            </div>

            <div class="vu-container">
                <div class="vu-row" id="vu-L"></div>
                <div class="vu-row" id="vu-R"></div>
            </div>

            <div class="volume-section">
                <div class="slider-track-v">
                    <input type="range" id="faderA" class="custom-slider-v" style="width:180px;" min="0" max="100" value="100" oninput="updateMixer()">
                </div>
                <div class="slider-track-v">
                    <input type="range" id="faderB" class="custom-slider-v" style="width:180px;" min="0" max="100" value="100" oninput="updateMixer()">
                </div>
            </div>

            <input type="range" id="xfader" min="0" max="100" value="50" oninput="updateMixer()">
        </div>

        <div class="deck">
            <div id="title-B" style="font-size:0.9rem; color:#0f0; background:#000; width:100%; padding:5px; text-align:center; margin-bottom:20px; border:1px solid #111;">DECK B - EMPTY</div>
            <div id="platter-B" class="platter"></div>
            <div style="position: absolute; right: 10px; top: 90px;">
                <div class="slider-track-v" style="height: 240px;">
                    <input type="range" class="custom-slider-v" min="0.5" max="2.0" step="0.01" value="1.0" oninput="updatePitch('B', this.value)">
                </div>
                <div id="val-B" style="color:#fff; text-align:center; margin-top:8px;">1.00x</div>
            </div>
            <button id="btn-play-B" class="btn-play" onclick="toggleDeck('B')">START / STOP</button>
        </div>
    </div>

    <div class="yt-hidden">
        <div id="playerA"></div>
        <div id="playerB"></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let playerA, playerB, pitchA = 1, pitchB = 1;

        function onYouTubeIframeAPIReady() {
            playerA = new YT.Player('playerA', { events: { 'onStateChange': (e) => syncUI('A', e.data) } });
            playerB = new YT.Player('playerB', { events: { 'onStateChange': (e) => syncUI('B', e.data) } });
            renderEmptySlots();
        }

        function renderEmptySlots() {
            document.getElementById('search-results').innerHTML = Array(6).fill('<div class="result-card empty-slot">NO SIGNAL</div>').join('');
        }

        function syncUI(deck, state) {
            const platter = document.getElementById('platter-' + deck);
            const btn = document.getElementById('btn-play-' + deck);
            state === 1 ? (platter.classList.add('playing'), btn.classList.add('active')) : (platter.classList.remove('playing'), btn.classList.remove('active'));
        }

        async function search() {
            const bar = document.getElementById('search-bar');
            const q = document.getElementById('query').value;
            if(!q) return;
            bar.classList.add('loading');
            try {
                const res = await fetch('/search?q=' + encodeURIComponent(q));
                const data = await res.json();
                let html = '';
                for(let i=0; i<6; i++) {
                    if(data[i]) {
                        html += `<div class="result-card">
                            <div style="font-size:0.8rem; color:#fff; overflow:hidden; white-space:nowrap;">${data[i].title}</div>
                            <div class="load-btns">
                                <button onclick="load('${data[i].id}', '${data[i].title.replace(/'/g,"")}', 'A')">LOAD A</button>
                                <button onclick="load('${data[i].id}', '${data[i].title.replace(/'/g,"")}', 'B')">LOAD B</button>
                            </div>
                        </div>`;
                    } else { html += `<div class="result-card empty-slot">---</div>`; }
                }
                document.getElementById('search-results').innerHTML = html;
            } finally { setTimeout(() => bar.classList.remove('loading'), 1000); }
        }

        function load(id, title, deck) {
            const p = (deck === 'A' ? playerA : playerB);
            p.cueVideoById(id);
            document.getElementById('title-' + deck).innerText = title.toUpperCase();
            document.getElementById('platter-' + deck).style.backgroundImage = `url('https://img.youtube.com/vi/${id}/hqdefault.jpg')`;
        }

        function toggleDeck(deck) {
            const p = (deck === 'A' ? playerA : playerB);
            p.getPlayerState() === 1 ? p.pauseVideo() : p.playVideo();
        }

        function updatePitch(deck, val) {
            const p = (deck === 'A' ? playerA : playerB);
            const s = parseFloat(val);
            if(deck === 'A') pitchA = s; else pitchB = s;
            document.getElementById('val-' + deck).innerText = s.toFixed(2) + 'x';
            if(p.setPlaybackRate) p.setPlaybackRate(s);
            document.getElementById('platter-' + deck).style.animationDuration = (3.33 / s) + 's';
        }

        function updateMixer() {
            const x = document.getElementById('xfader').value / 100;
            const fA = (100 - document.getElementById('faderA').value) / 100;
            const fB = (100 - document.getElementById('faderB').value) / 100;
            if(playerA.setVolume) playerA.setVolume(fA * Math.min(1, (1-x)*2) * 100);
            if(playerB.setVolume) playerB.setVolume(fB * Math.min(1, x*2) * 100);
        }

        function initVU() {
            ['vu-L', 'vu-R'].forEach(id => {
                const c = document.getElementById(id);
                c.innerHTML = Array(30).fill('<div class="led"></div>').join('');
            });
        }

        function updateVU() {
            const now = Date.now();
            const fA = (100 - document.getElementById('faderA').value) / 100;
            const fB = (100 - document.getElementById('faderB').value) / 100;
            const x = document.getElementById('xfader').value / 100;

            const isA = (playerA && playerA.getPlayerState() === 1) ? 1 : 0;
            const isB = (playerB && playerB.getPlayerState() === 1) ? 1 : 0;

            // Logica Master Sum: Fader + Crossfader + Pulsazione Beat
            const sigA = isA * fA * Math.min(1, (1-x)*2) * (Math.sin(now * 0.015 * pitchA) * 0.15 + 0.85);
            const sigB = isB * fB * Math.min(1, x*2) * (Math.sin(now * 0.015 * pitchB) * 0.15 + 0.85);

            let master = Math.min(1.1, sigA + sigB + (isA || isB ? Math.random()*0.05 : 0));

            [{id: 'vu-L', v: master*0.98}, {id: 'vu-R', v: master*1.02}].forEach(ch => {
                const leds = document.getElementById(ch.id).querySelectorAll('.led');
                const level = ch.v * 30;
                leds.forEach((l, i) => {
                    const active = i < level;
                    if(active) {
                        const col = i < 18 ? '#0f0' : (i < 25 ? '#ff0' : '#f00');
                        l.style.background = col;
                        l.style.boxShadow = `0 0 8px ${col}`;
                    } else {
                        l.style.background = 'var(--led-off)';
                        l.style.boxShadow = 'none';
                    }
                });
            });
            requestAnimationFrame(updateVU);
        }

        function unlock() { document.getElementById('overlay').style.display='none'; initVU(); updateVU(); }
    </script>
</body>
</html>
