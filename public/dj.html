<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YOUTUBOX •DJ•</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --amber: #ffb000; --bg: #000; --panel: #111; --grey: #222; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'VT323', monospace; }
        
        body { background: var(--bg); color: var(--amber); margin: 0; padding: 0; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

        /* SEZIONE RICERCA */
        .search-area { background: #000; padding: 10px; border-bottom: 1px solid #333; position: relative; }
        .search-row { display: flex; gap: 5px; }
        input[type="text"] { flex: 1; background: #fff; border: none; color: #000; padding: 10px; font-size: 1.2rem; font-weight: bold; }
        .btn-go { background: var(--amber); border: none; padding: 0 15px; color: #000; font-weight: bold; }
        
        /* Loading Bar Traktor Style */
        #loading-bar { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--amber); width: 0%; transition: width 0.3s; box-shadow: 0 0 10px var(--amber); }
        .loading-active { animation: load-anim 2s infinite ease-in-out; }
        @keyframes load-anim { 0% { left: -30%; width: 30%; } 100% { left: 100%; width: 30%; } }

        /* BRAND & VU METER */
        .brand-header { padding: 5px; text-align: center; border-bottom: 1px solid #222; }
        .vu-container { display: flex; flex-direction: column; gap: 2px; padding: 5px 20px; }
        .vu-row { height: 6px; background: #111; display: flex; gap: 1px; border: 1px solid #333; }
        .led { flex: 1; background: #222; }

        /* DECKS AREA */
        .decks-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; flex-shrink: 0; }
        .deck { background: var(--panel); border: 1px solid #333; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        .platter { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #000; background: #222 no-repeat center; background-size: cover; box-shadow: inset 0 0 20px #000; transition: transform 0.1s linear; }
        .playing { animation: spin 3s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .btn-action { width: 100%; margin: 10px 0; padding: 10px; background: #222; color: #666; border: 1px solid #444; font-size: 1.1rem; }
        .btn-active { color: #0f0; border-color: #0f0; box-shadow: 0 0 5px #0f0; }

        /* SLIDERS NATIVI (Verticali) */
        .controls-row { display: flex; width: 100%; justify-content: space-around; gap: 10px; height: 120px; }
        .slider-wrap { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .slider-wrap span { font-size: 0.7rem; color: #555; margin-top: 5px; }
        
        input[type="range"].v-range { 
            writing-mode: bt-lr; /* IE */
            appearance: slider-vertical; /* Webkit */
            width: 25px; height: 100px; background: #000; 
        }

        /* CROSSFADER & LISTA */
        .footer-mixer { padding: 10px; background: #080808; border-top: 1px solid #222; }
        #xfader { width: 100%; height: 30px; appearance: none; background: #111; border: 1px solid #333; }
        #xfader::-webkit-slider-thumb { appearance: none; width: 40px; height: 28px; background: var(--silver); border: 1px solid #fff; cursor: pointer; }

        #results-list { flex: 1; overflow-y: auto; background: #050505; border-top: 2px solid #222; }
        .track-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #111; gap: 10px; }
        .track-item:active { background: #111; }
        .track-info { flex: 1; font-size: 0.9rem; color: #fff; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .load-btns { display: flex; gap: 5px; }
        .mini-btn { background: #222; color: var(--amber); border: 1px solid #444; padding: 5px 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="search-area">
        <div class="search-row">
            <input type="text" id="q" placeholder="SEARCH TRACK..." spellcheck="false">
            <button class="btn-go" onclick="search()">OK</button>
        </div>
        <div id="loading-bar"></div>
    </div>

    <div class="brand-header">
        <div>YOUTUBOX •DJ•</div>
        <div class="vu-container">
            <div class="vu-row" id="vuL"></div>
            <div class="vu-row" id="vuR"></div>
        </div>
    </div>

    <div class="decks-container">
        <div class="deck">
            <div id="pA" class="platter"></div>
            <button id="btnA" class="btn-action" onclick="toggle('A')">START</button>
            <div class="controls-row">
                <div class="slider-wrap">
                    <input type="range" id="volA" class="v-range" min="0" max="100" value="100" oninput="updateAudio()">
                    <span>VOL</span>
                </div>
                <div class="slider-wrap">
                    <input type="range" id="pitchA" class="v-range" min="0.9" max="1.1" step="0.01" value="1.0" oninput="updateAudio()">
                    <span>PITCH</span>
                </div>
            </div>
        </div>
        <div class="deck">
            <div id="pB" class="platter"></div>
            <button id="btnB" class="btn-action" onclick="toggle('B')">START</button>
            <div class="controls-row">
                <div class="slider-wrap">
                    <input type="range" id="volB" class="v-range" min="0" max="100" value="100" oninput="updateAudio()">
                    <span>VOL</span>
                </div>
                <div class="slider-wrap">
                    <input type="range" id="pitchB" class="v-range" min="0.9" max="1.1" step="0.01" value="1.0" oninput="updateAudio()">
                    <span>PITCH</span>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-mixer">
        <input type="range" id="xfader" min="0" max="100" value="50" oninput="updateAudio()">
    </div>

    <div id="results-list"></div>

    <div style="position:absolute; top:-999px"><div id="playerA"></div><div id="playerB"></div></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let pA, pB;
        
        function onYouTubeIframeAPIReady() {
            const cfg = { height: '1', width: '1', playerVars: { 'controls': 0, 'disablekb': 1 } };
            pA = new YT.Player('playerA', { ...cfg, events: { 'onStateChange': (e) => syncUI('A', e.data) } });
            pB = new YT.Player('playerB', { ...cfg, events: { 'onStateChange': (e) => syncUI('B', e.data) } });
        }

        async function search() {
            const q = document.getElementById('q').value;
            if(!q) return;
            const bar = document.getElementById('loading-bar');
            bar.classList.add('loading-active');
            
            try {
                const r = await fetch('/search?q=' + encodeURIComponent(q));
                const items = await r.json();
                renderList(items);
            } finally {
                bar.classList.remove('loading-active');
            }
        }

        function renderList(items) {
            document.getElementById('results-list').innerHTML = items.map(i => `
                <div class="track-item">
                    <div class="track-info">${i.title.toUpperCase()}</div>
                    <div class="load-btns">
                        <button class="mini-btn" onclick="load('${i.id}', 'A', '${i.title.replace(/'/g,"")}')">A</button>
                        <button class="mini-btn" onclick="load('${i.id}', 'B', '${i.title.replace(/'/g,"")}')">B</button>
                    </div>
                </div>
            `).join('');
        }

        function load(id, deck, title) {
            const p = (deck === 'A' ? pA : pB);
            p.cueVideoById(id);
            document.getElementById('p' + deck).style.backgroundImage = `url('https://img.youtube.com/vi/${id}/hqdefault.jpg')`;
            updateAudio();
        }

        function updateAudio() {
            if(!pA.setVolume || !pB.setVolume) return;
            const x = document.getElementById('xfader').value / 100;
            const vA = document.getElementById('volA').value * Math.min(1, (1-x)*2);
            const vB = document.getElementById('volB').value * Math.min(1, x*2);
            
            pA.setVolume(vA);
            pB.setVolume(vB);
            
            if(pA.setPlaybackRate) pA.setPlaybackRate(parseFloat(document.getElementById('pitchA').value));
            if(pB.setPlaybackRate) pB.setPlaybackRate(parseFloat(document.getElementById('pitchB').value));
        }

        function toggle(d) {
            const p = (d === 'A' ? pA : pB);
            p.getPlayerState() === 1 ? p.pauseVideo() : (p.unMute(), p.playVideo());
            updateAudio();
        }

        function syncUI(d, s) {
            const plat = document.getElementById('p' + d);
            const btn = document.getElementById('btn' + d);
            if(s === 1) { plat.classList.add('playing'); btn.classList.add('active'); btn.innerText = "STOP"; }
            else { plat.classList.remove('playing'); btn.classList.remove('active'); btn.innerText = "START"; }
        }

        // VU METER LOOP
        function initVU() {
            document.getElementById('vuL').innerHTML = Array(20).fill('<div class="led"></div>').join('');
            document.getElementById('vuR').innerHTML = Array(20).fill('<div class="led"></div>').join('');
            
            setInterval(() => {
                const sA = (pA && pA.getPlayerState && pA.getPlayerState() === 1) ? 1 : 0;
                const sB = (pB && pB.getPlayerState && pB.getPlayerState() === 1) ? 1 : 0;
                const tot = (sA * (document.getElementById('volA').value/100) + sB * (document.getElementById('volB').value/100)) * (0.7 + Math.random()*0.3);
                
                document.querySelectorAll('.vu-row').forEach(row => {
                    row.querySelectorAll('.led').forEach((l, i) => {
                        l.style.background = i < (tot*20) ? (i < 13 ? '#0f0' : '#f00') : '#222';
                    });
                });
            }, 100);
        }
        
        window.onload = initVU;
        // Impedisce lo scrolling quando si toccano gli slider
        document.addEventListener('touchmove', (e) => { if(e.target.type === 'range') e.preventDefault(); }, {passive: false});
    </script>
</body>
</html>
