<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUTUBOX DJ - ANIMATED SEARCH</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --amber: #ffb000; --bg: #050505; --panel: #111; --silver: #999; }
        body { background: var(--bg); color: var(--amber); font-family: 'VT323', monospace; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        /* SEARCH CONTAINER */
        .search-container { 
            width: 100%; max-width: 1200px; background: #0a0a0a; padding: 12px; border-radius: 4px; 
            border: 1px solid #222; display: flex; gap: 10px; margin-bottom: 10px;
        }
        input[type=text] { flex: 1; background: transparent; border: none; color: #fff; padding: 8px; font-family: 'VT323'; font-size: 1.4rem; outline: none; }

        /* TASTO CERCA CON ANIMAZIONE CARICAMENTO */
        .btn-search {
            background: var(--amber); border: none; padding: 0 30px; font-family: 'VT323'; 
            cursor: pointer; font-weight: bold; font-size: 1.2rem; position: relative; overflow: hidden;
            transition: transform 0.1s;
        }
        .btn-search:active { transform: scale(0.95); }

        /* Effetto caricamento da sinistra a destra */
        .btn-search::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.4); transition: none;
        }
        .btn-search.loading::after {
            left: 100%; transition: left 0.6s ease-in-out;
        }

        #search-results { width: 100%; max-width: 1200px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .result-card { background: #0a0a0a; border: 1px solid #222; padding: 10px; border-radius: 2px; text-align: center; }

        /* DJ CONSOLE */
        .dj-setup { display: grid; grid-template-columns: 1fr 350px 1fr; gap: 20px; background: #0d0d0d; padding: 30px; border: 2px solid #222; width: 100%; max-width: 1200px; }
        .deck { background: var(--panel); padding: 25px; border: 1px solid #222; text-align: center; position: relative; display: flex; flex-direction: column; align-items: center; }
        
        /* FLAT SLIDERS */
        .slider-track-v { position: relative; width: 40px; background: #000; border: 1px solid #222; display: flex; align-items: center; justify-content: center; }
        .custom-slider-v { appearance: none; -webkit-appearance: none; background: transparent; transform: rotate(90deg); cursor: pointer; outline: none; position: absolute; width: 220px; z-index: 2; }
        .custom-slider-v::-webkit-slider-thumb { -webkit-appearance: none; width: 28px; height: 40px; background: var(--silver); border: none; border-radius: 0; cursor: ns-resize; }

        .platter { 
            width: 220px; height: 220px; border-radius: 50%; border: 10px solid #050505; 
            background-color: #000; background-size: cover; background-position: center;
            animation: spin 3.3s linear infinite; animation-play-state: paused;
            mask-image: radial-gradient(circle, transparent 10%, black 11%);
            -webkit-mask-image: radial-gradient(circle, transparent 10%, black 11%);
        }
        .platter.playing { animation-play-state: running; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* MIXER CENTER - LOGO E VU METER */
        .mixer { display: flex; flex-direction: column; align-items: center; justify-content: space-between; }
        .logo-box { text-align: center; width: 100%; }
        .logo-main { font-size: 1.5rem; color: #fff; letter-spacing: 8px; margin: 0; width: 100%; }
        .logo-sub { font-size: 5rem; color: var(--amber); font-weight: bold; line-height: 0.8; margin: 0; width: 100%; }

        .vu-container { width: 90%; background: #000; padding: 10px; border: 1px solid #222; margin: 15px 0; }
        .vu-row { display: flex; gap: 2px; height: 8px; margin: 4px 0; }
        .led { flex: 1; background: #111; }

        .volume-section { display: flex; gap: 60px; margin-top: 10px; }

        .btn-play { width: 160px; padding: 15px; background: #111; color: #444; border: 1px solid #222; cursor: pointer; font-family: 'VT323'; font-size: 1.4rem; margin-top: 25px; }
        .btn-play.active { background: #000; color: #0f0; border-color: #0f0; }

        #xfader { width: 100%; appearance: none; height: 4px; background: #222; outline: none; margin-top: 20px; }
        #xfader::-webkit-slider-thumb { appearance: none; width: 40px; height: 28px; background: var(--silver); border: none; }

        .yt-hidden { position: absolute; top: -9999px; visibility: hidden; }
        #overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    </style>
</head>
<body>

    <div id="overlay" onclick="unlock()"><h1>[ CLICCA PER ATTIVARE ]</h1></div>

    <div class="search-container">
        <input type="text" id="query" placeholder="CERCA TRACCIA">
        <button id="search-btn" class="btn-search" onclick="search()">CERCA</button>
    </div>

    <div id="search-results"></div>

    <div class="dj-setup">
        <div class="deck">
            <div id="title-A" style="font-size:0.9rem; margin-bottom:15px; height:20px; color:#0f0; background:#000; width:100%; overflow:hidden;">DECK A</div>
            <div id="platter-A" class="platter"></div>
            <div style="position: absolute; right: 15px; top: 75px;">
                <div class="slider-track-v" style="height: 240px;">
                    <input type="range" class="custom-slider-v" min="0.5" max="2.0" step="0.01" value="1.0" oninput="updatePitch('A', this.value)">
                </div>
                <div id="val-A" style="font-size:0.8rem; color:#fff; text-align:center; margin-top:5px;">1.0x</div>
            </div>
            <button id="btn-play-A" class="btn-play" onclick="toggleDeck('A')">START / STOP</button>
        </div>

        <div class="mixer">
            <div class="logo-box">
                <div class="logo-main">YOUTUBOX</div>
                <div class="logo-sub">DJ</div>
            </div>

            <div class="vu-container">
                <div class="vu-row" id="vu-L"></div>
                <div class="vu-row" id="vu-R"></div>
            </div>

            <div class="volume-section">
                <div class="slider-track-v" style="height:200px;">
                    <input type="range" id="faderA" class="custom-slider-v" style="width:180px;" min="0" max="100" value="100" oninput="updateMixer()">
                </div>
                <div class="slider-track-v" style="height:200px;">
                    <input type="range" id="faderB" class="custom-slider-v" style="width:180px;" min="0" max="100" value="100" oninput="updateMixer()">
                </div>
            </div>

            <input type="range" id="xfader" min="0" max="100" value="50" oninput="updateMixer()">
        </div>

        <div class="deck">
            <div id="title-B" style="font-size:0.9rem; margin-bottom:15px; height:20px; color:#0f0; background:#000; width:100%; overflow:hidden;">DECK B</div>
            <div id="platter-B" class="platter"></div>
            <div style="position: absolute; right: 15px; top: 75px;">
                <div class="slider-track-v" style="height: 240px;">
                    <input type="range" class="custom-slider-v" min="0.5" max="2.0" step="0.01" value="1.0" oninput="updatePitch('B', this.value)">
                </div>
                <div id="val-B" style="font-size:0.8rem; color:#fff; text-align:center; margin-top:5px;">1.0x</div>
            </div>
            <button id="btn-play-B" class="btn-play" onclick="toggleDeck('B')">START / STOP</button>
        </div>
    </div>

    <div class="yt-hidden">
        <div id="playerA"></div>
        <div id="playerB"></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let playerA, playerB;

        function onYouTubeIframeAPIReady() {
            playerA = new YT.Player('playerA', { events: { 'onStateChange': (e) => syncUI('A', e.data) } });
            playerB = new YT.Player('playerB', { events: { 'onStateChange': (e) => syncUI('B', e.data) } });
        }

        function syncUI(deck, state) {
            const platter = document.getElementById('platter-' + deck);
            const btn = document.getElementById('btn-play-' + deck);
            if(state === 1) { platter.classList.add('playing'); btn.classList.add('active'); }
            else { platter.classList.remove('playing'); btn.classList.remove('active'); }
        }

        async function search() {
            const btn = document.getElementById('search-btn');
            const q = document.getElementById('query').value;
            if(!q) return;

            // Attiva animazione caricamento
            btn.classList.add('loading');
            
            try {
                const res = await fetch('/search?q=' + encodeURIComponent(q));
                const data = await res.json();
                document.getElementById('search-results').innerHTML = data.slice(0, 6).map(s => `
                    <div class="result-card">
                        <div style="height:18px; overflow:hidden; font-weight:bold; color:#fff; font-size:0.8rem;">${s.title}</div>
                        <div style="display:flex; gap:5px; margin-top:10px;">
                            <button onclick="load('${s.id}', '${s.title.replace(/'/g,"")}', 'A')" style="flex:1; background:var(--amber); border:none; cursor:pointer; font-family:'VT323';">DECK A</button>
                            <button onclick="load('${s.id}', '${s.title.replace(/'/g,"")}', 'B')" style="flex:1; background:var(--amber); border:none; cursor:pointer; font-family:'VT323';">DECK B</button>
                        </div>
                    </div>
                `).join('');
            } finally {
                // Rimuovi animazione dopo un breve delay per farla vedere
                setTimeout(() => btn.classList.remove('loading'), 600);
            }
        }

        function load(id, title, deck) {
            const p = (deck === 'A' ? playerA : playerB);
            p.cueVideoById(id);
            document.getElementById('title-' + deck).innerText = title.toUpperCase();
            document.getElementById('platter-' + deck).style.backgroundImage = `url('https://img.youtube.com/vi/${id}/hqdefault.jpg')`;
        }

        function toggleDeck(deck) {
            const p = (deck === 'A' ? playerA : playerB);
            p.getPlayerState() === 1 ? p.pauseVideo() : p.playVideo();
        }

        function updatePitch(deck, val) {
            const p = (deck === 'A' ? playerA : playerB);
            const speed = parseFloat(val);
            document.getElementById('val-' + deck).innerText = speed.toFixed(2) + 'x';
            if(p && p.setPlaybackRate) p.setPlaybackRate(speed);
            const platter = document.getElementById('platter-' + deck);
            platter.style.animationDuration = (3.3 / speed) + 's';
        }

        function updateMixer() {
            const x = document.getElementById('xfader').value;
            const fA = document.getElementById('faderA').value;
            const fB = document.getElementById('faderB').value;
            if(playerA.setVolume) playerA.setVolume(Math.min(100, (100 - x) * 2) * (fA / 100));
            if(playerB.setVolume) playerB.setVolume(Math.min(100, x * 2) * (fB / 100));
        }

        function initVU() {
            ['vu-L', 'vu-R'].forEach(id => {
                const c = document.getElementById(id);
                c.innerHTML = '';
                for(let i=0; i<30; i++) {
                    const l = document.createElement('div');
                    l.className = 'led';
                    c.appendChild(l);
                }
            });
        }

        function updateVU() {
            const vA = (playerA && playerA.getPlayerState() === 1) ? document.getElementById('faderA').value/100 : 0;
            const vB = (playerB && playerB.getPlayerState() === 1) ? document.getElementById('faderB').value/100 : 0;
            const master = Math.max(vA, vB) * (Math.random() * 0.4 + 0.6);
            ['vu-L', 'vu-R'].forEach(id => {
                const leds = document.getElementById(id).querySelectorAll('.led');
                leds.forEach((l, i) => {
                    const active = i < master * 30;
                    l.style.background = active ? (i < 18 ? '#0f0' : (i < 25 ? '#ff0' : '#f00')) : '#111';
                });
            });
            requestAnimationFrame(updateVU);
        }

        function unlock() { document.getElementById('overlay').style.display='none'; initVU(); updateVU(); }
    </script>
</body>
</html>
