<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>YOUTUB<>X >>DJ<<</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --amber: #ffb000; --bg: #050505; --panel: #111; --silver: #bdc3c7; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'VT323', monospace; touch-action: none; }
        
        body { background: #1a1a1a; margin: 0; display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; }

        .phone-frame {
            width: 100%; max-width: 450px; height: 100%; background: var(--bg);
            display: flex; flex-direction: column; position: relative; border-left: 1px solid #333; border-right: 1px solid #333;
        }

        /* SEARCH & LOADING */
        .search-area { padding: 8px; background: #000; border-bottom: 1px solid #222; }
        .search-row { display: flex; gap: 5px; height: 38px; }
        input[type="text"] { flex: 1; background: #fff; border: none; color: #000; padding: 0 10px; font-size: 1.1rem; font-weight: bold; }
        .btn-go { background: var(--amber); border: none; padding: 0 15px; color: #000; font-weight: bold; cursor: pointer; }
        
        #load-bar-container { width: 100%; height: 3px; background: #111; margin-top: 5px; position: relative; overflow: hidden; opacity: 0; transition: opacity 0.3s; }
        #load-bar { width: 40%; height: 100%; background: var(--amber); position: absolute; animation: loading 1.5s infinite linear; }
        @keyframes loading { from { left: -40%; } to { left: 100%; } }

        /* HEADER */
        .brand-header { padding: 8px 0; text-align: center; }
        .brand-name { font-size: 1.8rem; color: var(--amber); text-shadow: 0 0 10px rgba(255,176,0,0.5); }
        .vu-container { padding: 0 25px; margin-top: 5px; }
        .vu-row { height: 6px; background: #000; display: flex; gap: 1px; border: 1px solid #222; margin-bottom: 2px; }
        .led { flex: 1; background: #151515; }

        /* DECKS */
        .decks-container { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; padding: 0 4px; }
        .deck { background: var(--panel); border: 1px solid #222; padding: 10px 0; display: flex; flex-direction: column; align-items: center; }
        
        .platter { width: 85px; height: 85px; border-radius: 50%; border: 4px solid #000; background: #222 no-repeat center; background-size: cover; box-shadow: inset 0 0 15px #000; }
        .playing { animation: spin 3s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .btn-start { width: 85%; margin: 10px 0; padding: 6px; background: #222; color: #555; border: 1px solid #333; font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .btn-active { color: #0f0; border-color: #0f0; background: #0a150a; box-shadow: 0 0 8px rgba(0,255,0,0.2); }

        /* FADERS STYLE */
        input[type=range] { -webkit-appearance: none; background: transparent; outline: none; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 38px; height: 22px; 
            background: var(--silver); border: 1px solid #fff; border-radius: 2px;
            box-shadow: 0 2px 5px #000;
        }

        .fader-section { display: flex; width: 100%; justify-content: space-around; height: 180px; padding-top: 10px; position: relative; }
        .fader-container { position: relative; width: 40px; height: 160px; display: flex; justify-content: center; }
        .scale { position: absolute; left: 4px; top: 0; height: 160px; width: 6px; border-left: 1px solid #333; display: flex; flex-direction: column; justify-content: space-between; }
        .scale i { width: 4px; height: 1px; background: #333; }
        .v-fader { width: 160px; height: 40px; transform: rotate(-90deg); position: absolute; top: 60px; z-index: 5; }

        /* MIXER CENTER */
        .mixer-center { padding: 15px 20px; background: #080808; display: flex; flex-direction: column; gap: 30px; border-top: 1px solid #222; }
        
        /* FILTRO NEON */
        .filter-wrap { width: 100%; text-align: center; }
        .filter-label { font-size: 0.8rem; color: #666; margin-bottom: 8px; display: block; }
        .filter-slider { width: 100%; height: 6px !important; background: #000 !important; border: 1px solid #444 !important; border-radius: 10px; }
        .filter-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 26px !important; height: 26px !important; 
            border-radius: 50% !important; background: #111 !important; border: 2px solid var(--amber) !important;
            box-shadow: 0 0 15px var(--amber); cursor: pointer;
        }

        /* CROSSFADER */
        .h-fader { width: 100%; height: 12px; background: #000; border: 1px solid #222; }
        .h-fader::-webkit-slider-thumb { width: 55px !important; height: 30px !important; }

        /* RESULTS */
        #results-list { flex: 1; overflow-y: auto; background: #000; border-top: 2px solid #222; }
        .track { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #111; gap: 10px; }
        .track-t { flex: 1; font-size: 0.9rem; color: #777; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .l-btn { background: #1a1a1a; color: var(--amber); border: 1px solid #333; padding: 6px 14px; font-size: 0.8rem; cursor: pointer; }
    </style>
</head>
<body>

    <div class="phone-frame">
        <div class="search-area">
            <div class="search-row">
                <input type="text" id="q" placeholder="SEARCH TRAX..." onkeypress="if(event.key==='Enter') doSearch()">
                <button class="btn-go" onclick="doSearch()">OK</button>
            </div>
            <div id="load-bar-container"><div id="load-bar"></div></div>
        </div>

        <div class="brand-header">
            <div class="brand-name">YOUTUB<>X >>DJ<<</div>
            <div class="vu-container">
                <div class="vu-row" id="vuL"></div>
                <div class="vu-row" id="vuR"></div>
            </div>
        </div>

        <div class="decks-container">
            <div class="deck">
                <div id="pA" class="platter"></div>
                <button id="bA" class="btn-start" onclick="tk('A')">START</button>
                <div class="fader-section">
                    <div class="fader-container">
                        <div class="scale"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
                        <input type="range" id="volA" class="v-fader" min="0" max="100" value="100" oninput="mix()">
                    </div>
                    <div class="fader-container">
                        <div class="scale"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
                        <input type="range" id="pchA" class="v-fader" min="0.8" max="1.2" step="0.005" value="1.0" oninput="mix()">
                    </div>
                </div>
            </div>

            <div class="deck">
                <div id="pB" class="platter"></div>
                <button id="bB" class="btn-start" onclick="tk('B')">START</button>
                <div class="fader-section">
                    <div class="fader-container">
                        <div class="scale"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
                        <input type="range" id="volB" class="v-fader" min="0" max="100" value="100" oninput="mix()">
                    </div>
                    <div class="fader-container">
                        <div class="scale"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
                        <input type="range" id="pchB" class="v-fader" min="0.8" max="1.2" step="0.005" value="1.0" oninput="mix()">
                    </div>
                </div>
            </div>
        </div>

        <div class="mixer-center">
            <div class="filter-wrap">
                <span class="filter-label">HPF <---> LPF</span>
                <input type="range" id="filter" class="filter-slider" min="-100" max="100" value="0" oninput="mix()">
            </div>
            <div class="xfader-wrap">
                <input type="range" id="xf" class="h-fader" min="0" max="100" value="50" oninput="mix()">
            </div>
        </div>

        <div id="results-list"></div>
    </div>

    <div style="display:none"><div id="ytA"></div><div id="ytB"></div></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let pA, pB;
        
        // Inizializza LED VU Meter
        function createLEDs() {
            ['vuL', 'vuR'].forEach(id => {
                const row = document.getElementById(id);
                for(let i=0; i<20; i++) {
                    const led = document.createElement('div');
                    led.className = 'led';
                    row.appendChild(led);
                }
            });
        }

        function onYouTubeIframeAPIReady() {
            const cfg = { height: '1', width: '1', playerVars: { 'controls': 0, 'disablekb': 1 } };
            pA = new YT.Player('ytA', { ...cfg, events: { 'onStateChange': (e) => sync('A', e.data) } });
            pB = new YT.Player('ytB', { ...cfg, events: { 'onStateChange': (e) => sync('B', e.data) } });
            createLEDs();
            startVUMeters();
        }

        async function doSearch() {
            const q = document.getElementById('q').value;
            if(!q) return;
            const lbar = document.getElementById('load-bar-container');
            lbar.style.opacity = "1";
            try {
                const r = await fetch('/search?q=' + encodeURIComponent(q));
                const d = await r.json();
                document.getElementById('results-list').innerHTML = d.map(i => `
                    <div class="track">
                        <div class="track-t">${i.title.toUpperCase()}</div>
                        <button class="l-btn" onclick="ld('${i.id}','A')">A</button>
                        <button class="l-btn" onclick="ld('${i.id}','B')">B</button>
                    </div>`).join('');
            } catch(e) {}
            lbar.style.opacity = "0";
        }

        function ld(id, d) {
            (d === 'A' ? pA : pB).cueVideoById(id);
            document.getElementById('p' + d).style.backgroundImage = `url('https://img.youtube.com/vi/${id}/hqdefault.jpg')`;
            mix();
        }

        function mix() {
            if(!pA || !pA.setVolume) return;
            const x = document.getElementById('xf').value / 100;
            const fVal = Math.abs(document.getElementById('filter').value) / 250;
            const vA = document.getElementById('volA').value * Math.min(1, (1-x)*2) * (1 - fVal);
            const vB = document.getElementById('volB').value * Math.min(1, x*2) * (1 - fVal);
            pA.setVolume(vA); pB.setVolume(vB);
            pA.setPlaybackRate(parseFloat(document.getElementById('pchA').value));
            pB.setPlaybackRate(parseFloat(document.getElementById('pchB').value));
        }

        function tk(d) {
            const p = (d === 'A' ? pA : pB);
            p.getPlayerState() === 1 ? p.pauseVideo() : (p.unMute(), p.playVideo());
            mix();
        }

        function sync(d, s) {
            const pl = document.getElementById('p' + d);
            const bt = document.getElementById('b' + d);
            if(s === 1) { pl.classList.add('playing'); bt.classList.add('btn-active'); bt.innerText = "STOP"; }
            else { pl.classList.remove('playing'); bt.classList.remove('btn-active'); bt.innerText = "START"; }
        }

        function startVUMeters() {
            setInterval(() => {
                const sA = (pA && pA.getPlayerState && pA.getPlayerState() === 1) ? 1 : 0;
                const sB = (pB && pB.getPlayerState && pB.getPlayerState() === 1) ? 1 : 0;
                const vA = sA * (document.getElementById('volA').value / 100) * (0.5 + Math.random() * 0.5);
                const vB = sB * (document.getElementById('volB').value / 100) * (0.5 + Math.random() * 0.5);
                updateRow('vuL', vA);
                updateRow('vuR', vB);
            }, 80);
        }

        function updateRow(id, val) {
            const leds = document.getElementById(id).querySelectorAll('.led');
            const active = Math.floor(val * leds.length);
            leds.forEach((l, i) => {
                if(i < active) {
                    l.style.background = i < 14 ? '#0f0' : (i < 17 ? '#ff0' : '#f00');
                } else {
                    l.style.background = '#151515';
                }
            });
        }

        function setupDoubleTap(elementId, resetValue) {
            const el = document.getElementById(elementId);
            let lastTap = 0;
            el.addEventListener('touchstart', (e) => {
                const now = Date.now();
                if (now - lastTap < 300) {
                    el.value = resetValue;
                    mix();
                    e.preventDefault();
                }
                lastTap = now;
                e.stopPropagation();
            }, { passive: false });
        }

        window.onload = () => {
            setupDoubleTap('pchA', 1.0); setupDoubleTap('pchB', 1.0); setupDoubleTap('filter', 0);
            document.querySelectorAll('input[type=range]').forEach(el => {
                el.addEventListener('touchmove', e => e.stopPropagation(), {passive:true});
            });
        };
    </script>
</body>
</html>
