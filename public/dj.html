<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUTUBOX DJ - FULL POWER</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --amber: #ffb000; --bg: #050505; --panel: #111; --silver: #999; --led-off: #111; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--amber); font-family: 'VT323', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* BARRA RICERCA */
        .search-container { width: 100%; max-width: 1200px; background: #0a0a0a; padding: 10px 15px; border: 1px solid #222; display: flex; gap: 15px; margin-bottom: 15px; position: relative; overflow: hidden; }
        .search-container::after { content: ''; position: absolute; top: 0; left: -100%; width: 40%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255, 176, 0, 0.4), transparent); pointer-events: none; }
        .search-container.loading::after { animation: scan 0.8s infinite linear; }
        @keyframes scan { from { left: -100%; } to { left: 150%; } }
        input[type=text] { flex: 1; background: transparent; border: none; color: #fff; font-family: 'VT323'; font-size: 1.5rem; outline: none; }
        .btn-search { background: var(--amber); border: none; padding: 0 40px; font-family: 'VT323'; font-weight: bold; font-size: 1.3rem; cursor: pointer; }

        /* GRIGLIA RISULTATI 5+1 */
        #search-results { width: 100%; max-width: 1200px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; min-height: 195px; }
        .result-card { background: #0d0d0d; border: 1px solid #222; padding: 12px; height: 90px; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        
        .nav-panel { display: flex; align-items: center; justify-content: center; border: 1px solid var(--amber); gap: 20px; }
        .nav-btn { background: transparent; border: none; color: var(--amber); font-family: 'VT323'; font-size: 4rem; cursor: pointer; line-height: 1; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .nav-btn:hover:not(:disabled) { color: #fff; text-shadow: 0 0 10px var(--amber); }
        .nav-btn:disabled { opacity: 0.1; cursor: not-allowed; }
        .page-num { font-size: 2.5rem; color: #fff; min-width: 30px; text-align: center; }

        .load-btns { display: flex; gap: 5px; }
        .load-btns button { flex: 1; background: #222; color: var(--amber); border: 1px solid #333; font-family: 'VT323'; cursor: pointer; padding: 4px; font-size: 1rem; }
        .load-btns button:hover { background: var(--amber); color: #000; }

        /* DJ CONSOLE CENTRATA */
        .dj-setup { display: grid; grid-template-columns: 1fr 360px 1fr; gap: 20px; background: #080808; padding: 40px; border: 3px solid #1a1a1a; width: 100%; max-width: 1200px; }
        .deck { background: var(--panel); padding: 30px; border: 1px solid #222; display: flex; flex-direction: column; align-items: center; position: relative; }
        .mixer { display: flex; flex-direction: column; align-items: center; justify-content: space-between; }
        
        /* LOGO CENTRATO */
        .logo-group { text-align: center; margin-bottom: 10px; }
        .logo-box { letter-spacing: 12px; font-size: 1.2rem; color: #fff; margin-bottom: -10px; }
        .logo-sub { font-size: 6rem; color: var(--amber); font-weight: bold; line-height: 1; margin: 0; }

        /* VU METER & FADERS */
        .vu-container { width: 100%; background: #000; padding: 10px; border: 2px solid #151515; margin: 15px 0; }
        .vu-row { display: flex; gap: 2px; height: 12px; margin: 4px 0; }
        .led { flex: 1; background: var(--led-off); transition: 0.05s; }
        
        .volume-section { display: flex; gap: 60px; height: 180px; }
        .slider-track-v { position: relative; width: 50px; background: #000; border: 1px solid #222; display: flex; justify-content: center; }
        .custom-slider-v { appearance: none; background: transparent; transform: rotate(-90deg); cursor: pointer; width: 180px; position: absolute; top: 80px; z-index: 5; }
        .custom-slider-v::-webkit-slider-thumb { appearance: none; width: 35px; height: 50px; background: var(--silver); border: 1px solid #666; border-radius: 2px; }

        /* PLATTER & BUTTONS */
        .platter { width: 210px; height: 210px; border-radius: 50%; border: 10px solid #000; background-size: cover; background-position: center; animation: spin 3.33s linear infinite; animation-play-state: paused; mask-image: radial-gradient(circle, transparent 8%, black 9%); -webkit-mask-image: radial-gradient(circle, transparent 8%, black 9%); }
        .platter.playing { animation-play-state: running; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .btn-play { width: 160px; padding: 15px; background: #151515; color: #444; border: 1px solid #222; cursor: pointer; font-family: 'VT323'; font-size: 1.5rem; margin-top: 30px; }
        .btn-play.active { color: #0f0; border-color: #0f0; box-shadow: 0 0 15px rgba(0,255,0,0.3); }
        #xfader { width: 100%; appearance: none; height: 8px; background: #000; border: 1px solid #222; margin-top: 30px; outline: none; }
        #xfader::-webkit-slider-thumb { appearance: none; width: 60px; height: 40px; background: var(--silver); cursor: pointer; }
        
        .yt-hidden { position: absolute; top: -9999px; }
        #overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    </style>
</head>
<body>

<div id="overlay" onclick="unlock()"><h1>[ CLICCA PER ATTIVARE IL SISTEMA ]</h1></div>

<div class="search-container" id="search-bar">
    <input type="text" id="query" placeholder="CERCA TRACCIA...">
    <button id="search-btn" class="btn-search" onclick="search()">CERCA</button>
</div>

<div id="search-results"></div>

<div class="dj-setup">
    <div class="deck">
        <div id="title-A" style="font-size:0.8rem; color:#0f0; background:#000; width:100%; padding:5px; text-align:center; margin-bottom:20px; overflow:hidden;">A - STANDBY</div>
        <div id="platter-A" class="platter"></div>
        <button id="btn-play-A" class="btn-play" onclick="toggleDeck('A')">START / STOP</button>
    </div>

    <div class="mixer">
        <div class="logo-group">
            <div class="logo-box">YOUTUBOX</div>
            <div class="logo-sub">DJ</div>
        </div>

        <div class="vu-container">
            <div class="vu-row" id="vu-L"></div>
            <div class="vu-row" id="vu-R"></div>
        </div>

        <div class="volume-section">
            <div class="slider-track-v">
                <input type="range" id="faderA" class="custom-slider-v" min="0" max="100" value="0" oninput="updateMixer()">
            </div>
            <div class="slider-track-v">
                <input type="range" id="faderB" class="custom-slider-v" min="0" max="100" value="0" oninput="updateMixer()">
            </div>
        </div>

        <input type="range" id="xfader" min="0" max="100" value="50" oninput="updateMixer()">
    </div>

    <div class="deck">
        <div id="title-B" style="font-size:0.8rem; color:#0f0; background:#000; width:100%; padding:5px; text-align:center; margin-bottom:20px; overflow:hidden;">B - STANDBY</div>
        <div id="platter-B" class="platter"></div>
        <button id="btn-play-B" class="btn-play" onclick="toggleDeck('B')">START / STOP</button>
    </div>
</div>

<div class="yt-hidden"><div id="playerA"></div><div id="playerB"></div></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    let playerA, playerB, searchResults = [], currentPage = 0;

    function onYouTubeIframeAPIReady() {
        playerA = new YT.Player('playerA', { events: { 'onStateChange': (e) => syncUI('A', e.data) } });
        playerB = new YT.Player('playerB', { events: { 'onStateChange': (e) => syncUI('B', e.data) } });
        renderPage();
    }

    async function search() {
        const bar = document.getElementById('search-bar');
        const q = document.getElementById('query').value;
        if(!q) return;
        bar.classList.add('loading');
        try {
            const res = await fetch('/search?q=' + encodeURIComponent(q));
            searchResults = await res.json();
            currentPage = 0;
            renderPage();
        } finally { bar.classList.remove('loading'); }
    }

    function renderPage() {
        const container = document.getElementById('search-results');
        const start = currentPage * 5;
        const currentSet = searchResults.slice(start, start + 5);
        let html = '';

        for(let i=0; i<5; i++) {
            if(currentSet[i]) {
                html += `<div class="result-card">
                    <div style="font-size:0.75rem; color:#fff; overflow:hidden;">${currentSet[i].title}</div>
                    <div class="load-btns">
                        <button onclick="load('${currentSet[i].id}', '${currentSet[i].title.replace(/'/g,"")}', 'A')">LOAD A</button>
                        <button onclick="load('${currentSet[i].id}', '${currentSet[i].title.replace(/'/g,"")}', 'B')">LOAD B</button>
                    </div>
                </div>`;
            } else {
                html += `<div class="result-card" style="opacity:0.1; border-style:dashed;">READY</div>`;
            }
        }

        const canPrev = currentPage > 0;
        const canNext = (currentPage + 1) * 5 < searchResults.length;

        html += `<div class="result-card nav-panel">
            <button class="nav-btn" onclick="changePage(-1)" ${!canPrev ? 'disabled' : ''}>&lt;</button>
            <div class="page-num">${currentPage + 1}</div>
            <button class="nav-btn" onclick="changePage(1)" ${!canNext ? 'disabled' : ''}>&gt;</button>
        </div>`;

        container.innerHTML = html;
    }

    function changePage(dir) { currentPage += dir; renderPage(); }

    function load(id, title, deck) {
        const p = (deck === 'A' ? playerA : playerB);
        p.cueVideoById(id);
        document.getElementById('title-' + deck).innerText = title.toUpperCase();
        document.getElementById('platter-' + deck).style.backgroundImage = `url('https://img.youtube.com/vi/${id}/hqdefault.jpg')`;
    }

    function toggleDeck(deck) {
        const p = (deck === 'A' ? playerA : playerB);
        p.getPlayerState() === 1 ? p.pauseVideo() : p.playVideo();
    }

    function syncUI(deck, state) {
        const platter = document.getElementById('platter-' + deck);
        const btn = document.getElementById('btn-play-' + deck);
        state === 1 ? (platter.classList.add('playing'), btn.classList.add('active')) : (platter.classList.remove('playing'), btn.classList.remove('active'));
    }

    function updateMixer() {
        const x = document.getElementById('xfader').value / 100;
        const volA = (100 - document.getElementById('faderA').value); // 100-0 = 100 (Max)
        const volB = (100 - document.getElementById('faderB').value);
        if(playerA.setVolume) playerA.setVolume(volA * Math.min(1, (1-x)*2));
        if(playerB.setVolume) playerB.setVolume(volB * Math.min(1, x*2));
    }

    function initVU() {
        ['vu-L', 'vu-R'].forEach(id => { document.getElementById(id).innerHTML = Array(30).fill('<div class="led"></div>').join(''); });
    }

    function updateVU() {
        const now = Date.now();
        const fA = (100 - document.getElementById('faderA').value) / 100;
        const fB = (100 - document.getElementById('faderB').value) / 100;
        const x = document.getElementById('xfader').value / 100;
        const isA = (playerA && playerA.getPlayerState() === 1) ? 1 : 0;
        const isB = (playerB && playerB.getPlayerState() === 1) ? 1 : 0;
        
        let master = (isA * fA * Math.min(1, (1-x)*2) + isB * fB * Math.min(1, x*2)) * (Math.sin(now * 0.015) * 0.2 + 0.8);
        master = Math.min(1.1, master + (isA || isB ? Math.random() * 0.05 : 0));

        [{id: 'vu-L', v: master}, {id: 'vu-R', v: master * 0.95}].forEach(ch => {
            const leds = document.getElementById(ch.id).querySelectorAll('.led');
            const level = ch.v * 30;
            leds.forEach((l, i) => {
                const active = i < level;
                l.style.background = active ? (i < 18 ? '#0f0' : (i < 25 ? '#ff0' : '#f00')) : 'var(--led-off)';
                l.style.boxShadow = active ? `0 0 8px ${i < 18 ? '#0f0' : '#f00'}` : 'none';
            });
        });
        requestAnimationFrame(updateVU);
    }

    function unlock() { document.getElementById('overlay').style.display='none'; initVU(); updateVU(); updateMixer(); }
</script>
</body>
</html>
