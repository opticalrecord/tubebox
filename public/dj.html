<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUTUBOX DJ - TECHNICS STYLE</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --amber: #ffb000; --red: #ff4444; --blue: #0088ff; --bg: #050505; --panel: #1a1a1a; --silver: #888; --dark: #111; }
        body { background: var(--bg); color: var(--amber); font-family: 'VT323', monospace; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        /* ANIMAZIONI */
        @keyframes vibrato {
            0% { transform: translate(0, 0); border-color: var(--amber); }
            50% { transform: translate(-1px, 1px); border-color: #fff; }
            100% { transform: translate(0, 0); }
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* UI SEARCH */
        .top-row { width: 100%; max-width: 1200px; display: grid; grid-template-columns: 1fr 300px; gap: 15px; margin-bottom: 15px; }
        .search-container { background: #222; padding: 12px; border-radius: 8px; border: 2px solid #333; display: flex; gap: 10px; }
        .search-container.searching { animation: vibrato 0.1s infinite; box-shadow: 0 0 15px var(--amber); }
        input[type=text] { flex: 1; background: #000; border: 1px solid var(--amber); color: var(--amber); padding: 8px; font-family: 'VT323'; font-size: 1.2rem; outline: none; }
        
        #search-results { width: 100%; max-width: 1200px; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; margin-bottom: 15px; max-height: 120px; overflow-y: auto; }
        .result-card { background: #111; border: 1px solid #444; padding: 6px; font-size: 0.75rem; animation: fadeIn 0.3s ease forwards; opacity: 0; }

        /* DJ CONSOLE */
        .dj-setup { display: grid; grid-template-columns: 1fr 220px 1fr; gap: 20px; background: #151515; padding: 25px; border-radius: 10px; border: 4px solid #333; width: 100%; max-width: 1200px; box-shadow: inset 0 0 50px #000; }
        
        .deck { background: var(--panel); padding: 20px; border-radius: 8px; border: 2px solid #222; text-align: center; position: relative; display: flex; flex-direction: column; align-items: center; }
        
        /* PITCH SLIDER ESTETICA GIRADISCHI */
        .pitch-section { position: absolute; right: 15px; top: 50px; height: 220px; width: 40px; display: flex; flex-direction: column; align-items: center; background: #111; border-radius: 4px; border: 1px solid #333; padding: 10px 0; }
        .pitch-slider { -webkit-appearance: none; appearance: none; width: 180px; height: 4px; background: #333; transform: rotate(90deg); margin-top: 85px; cursor: pointer; }
        .pitch-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 35px; background: #ccc; border: 2px solid #555; border-radius: 2px; cursor: ns-resize; box-shadow: 0 0 5px #000; }
        .pitch-label { font-size: 0.7rem; color: var(--silver); margin-top: 85px; z-index: 2; }

        /* PLATTER */
        .platter { 
            width: 220px; height: 220px; border-radius: 50%; border: 12px solid #111; 
            background-color: #080808; background-size: cover; background-position: center;
            animation: spin 3.3s linear infinite; animation-play-state: paused;
            box-shadow: 0 0 30px #000, inset 0 0 10px #000;
            mask-image: radial-gradient(circle, transparent 10%, black 11%);
            -webkit-mask-image: radial-gradient(circle, transparent 10%, black 11%);
        }
        .platter.playing { animation-play-state: running; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* CONTROLLI */
        .nudge-group { display: flex; gap: 5px; margin-top: 10px; }
        .btn-nudge { background: #222; color: #fff; border: 1px solid #444; width: 35px; cursor: pointer; font-family: 'VT323'; }
        .btn-nudge:active { background: var(--blue); }

        .btn-start-stop { width: 180px; padding: 15px; background: #222; color: #666; border: 2px solid #444; cursor: pointer; font-family: 'VT323'; font-size: 1.4rem; margin-top: 20px; transition: 0.1s; }
        .btn-start-stop.active { background: #1a331a; color: #0f0; border-color: #0f0; box-shadow: 0 0 10px #0f0; }

        /* MIXER CENTRALE */
        .mixer { display: flex; flex-direction: column; align-items: center; justify-content: space-between; position: relative; }
        
        /* LOGO YOUTUBOX DJ */
        .dj-logo {
            position: absolute;
            top: -15px;
            left: 20px;
            text-align: left;
            text-shadow: 0 0 5px #000;
        }
        .logo-small { font-size: 0.8rem; color: #fff; letter-spacing: 1px; }
        .logo-large { font-size: 2.2rem; color: var(--amber); font-weight: bold; line-height: 0.8; }

        .v-faders { display: flex; gap: 40px; margin-top: 35px; } /* Spazio per il logo */
        .fader-v { appearance: slider-vertical; width: 30px; height: 120px; accent-color: var(--amber); cursor: pointer; }
        .btn-siren { background: var(--red); color: white; width: 70px; height: 70px; border-radius: 50%; border: 4px solid #800; font-family: 'VT323'; cursor: pointer; margin: 15px 0; }
        .xfader-box { width: 100%; background: #000; padding: 10px; border: 1px solid #333; border-radius: 4px; }
        
        #overlay { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        #playerA, #playerB { position: absolute; top: -9999px; }
    </style>
</head>
<body>

    <div id="overlay" onclick="unlock()"><h1>[ CLICK TO POWER ON SYSTEM ]</h1></div>

    <div class="top-row">
        <div id="search-banner" class="search-container">
            <input type="text" id="query" placeholder="SEARCH VINYL...">
            <button onclick="search()" style="background:var(--amber); border:none; padding:0 15px; font-family:'VT323'; cursor:pointer;">FIND</button>
        </div>
        <div style="display:flex; gap:5px;">
            <button class="btn-nudge" style="flex:1" onmousedown="playSample('horn')">HORN</button>
            <button class="btn-nudge" style="flex:1" onmousedown="playSample('laser')">LASER</button>
        </div>
    </div>

    <div id="search-results"></div>

    <div class="dj-setup">
        <div class="deck">
            <div class="lcd" id="title-A" style="width:100%; background:#000; color:#0f0; margin-bottom:10px; padding:5px; height:20px; overflow:hidden;">DECK A: READY</div>
            <div id="platter-A" class="platter"></div>
            
            <div class="pitch-section">
                <span style="font-size:0.5rem">PITCH</span>
                <input type="range" id="pitch-A" class="pitch-slider" min="0.92" max="1.08" step="0.001" value="1" oninput="updatePitch('A', this.value)">
                <div class="pitch-label" id="val-A">±0%</div>
            </div>

            <div class="nudge-group">
                <button class="btn-nudge" onmousedown="nudge('A', -0.05)" onmouseup="nudge('A', 0)">-</button>
                <button class="btn-nudge" onmousedown="nudge('A', 0.05)" onmouseup="nudge('A', 0)">+</button>
            </div>

            <button id="btn-play-A" class="btn-start-stop" onclick="toggleDeck('A')">START · STOP</button>
        </div>

        <div class="mixer">
            <div class="dj-logo">
                <div class="logo-small">YOUTUBOX</div>
                <div class="logo-large">DJ</div>
            </div>

            <div class="v-faders">
                <input type="range" id="faderA" class="fader-v" min="0" max="100" value="100" oninput="updateMixer()">
                <input type="range" id="faderB" class="fader-v" min="0" max="100" value="100" oninput="updateMixer()">
            </div>
            <button class="btn-siren" onmousedown="siren(true)" onmouseup="siren(false)">DUB</button>
            <div class="xfader-box">
                <input type="range" id="xfader" min="0" max="100" value="50" oninput="updateMixer()">
            </div>
        </div>

        <div class="deck">
            <div class="lcd" id="title-B" style="width:100%; background:#000; color:#0f0; margin-bottom:10px; padding:5px; height:20px; overflow:hidden;">DECK B: READY</div>
            <div id="platter-B" class="platter"></div>

            <div class="pitch-section">
                <span style="font-size:0.5rem">PITCH</span>
                <input type="range" id="pitch-B" class="pitch-slider" min="0.92" max="1.08" step="0.001" value="1" oninput="updatePitch('B', this.value)">
                <div class="pitch-label" id="val-B">±0%</div>
            </div>

            <div class="nudge-group">
                <button class="btn-nudge" onmousedown="nudge('B', -0.05)" onmouseup="nudge('B', 0)">-</button>
                <button class="btn-nudge" onmousedown="nudge('B', 0.05)" onmouseup="nudge('B', 0)">+</button>
            </div>

            <button id="btn-play-B" class="btn-start-stop" onclick="toggleDeck('B')">START · STOP</button>
        </div>
    </div>

    <div id="playerA"></div>
    <div id="playerB"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let playerA, playerB;
        let basePitchA = 1, basePitchB = 1;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let sirenOsc = null;

        function onYouTubeIframeAPIReady() {
            playerA = new YT.Player('playerA', { events: { 'onStateChange': (e) => syncUI('A', e.data) } });
            playerB = new YT.Player('playerB', { events: { 'onStateChange': (e) => syncUI('B', e.data) } });
        }

        function syncUI(deck, state) {
            const platter = document.getElementById('platter-' + deck);
            const btn = document.getElementById('btn-play-' + deck);
            if(state === 1) { platter.classList.add('playing'); btn.classList.add('active'); }
            else { platter.classList.remove('playing'); btn.classList.remove('active'); }
        }

        async function search() {
            const q = document.getElementById('query').value;
            if(!q) return;
            const banner = document.getElementById('search-banner');
            banner.classList.add('searching');
            const res = await fetch('/search?q=' + encodeURIComponent(q));
            const data = await res.json();
            const container = document.getElementById('search-results');
            container.innerHTML = data.map((s, i) => `
                <div class="result-card" style="animation-delay:${i*0.05}s">
                    <div style="height:18px; overflow:hidden">${s.title}</div>
                    <div style="display:flex; gap:4px; margin-top:4px;">
                        <button onclick="load('${s.id}', '${s.title.replace(/'/g,"")}', 'A')" style="flex:1; background:var(--amber); border:none; cursor:pointer; font-family:'VT323';">A</button>
                        <button onclick="load('${s.id}', '${s.title.replace(/'/g,"")}', 'B')" style="flex:1; background:var(--amber); border:none; cursor:pointer; font-family:'VT323';">B</button>
                    </div>
                </div>
            `).join('');
            banner.classList.remove('searching');
        }

      function load(id, title, deck) {
    const p = (deck === 'A' ? playerA : playerB);
    
    // Usa cueVideoById invece di loadVideoById per evitare l'auto-play
    p.cueVideoById(id);
    
    document.getElementById('title-' + deck).innerText = title;
    
    // Aggiorna la thumbnail sul disco
    const platter = document.getElementById('platter-' + deck);
    platter.style.backgroundImage = `url('https://img.youtube.com/vi/${id}/hqdefault.jpg')`;
    
    // Reset dello stato grafico (fermo)
    platter.classList.remove('playing');
    document.getElementById('btn-play-' + deck).classList.remove('active');
}

        function toggleDeck(deck) {
            const p = (deck === 'A' ? playerA : playerB);
            p.getPlayerState() === 1 ? p.pauseVideo() : p.playVideo();
        }

        function updatePitch(deck, val) {
            const p = (deck === 'A' ? playerA : playerB);
            const display = document.getElementById('val-' + deck);
            const perc = ((val - 1) * 100).toFixed(1);
            if(deck === 'A') basePitchA = parseFloat(val); else basePitchB = parseFloat(val);
            
            p.setPlaybackRate(parseFloat(val));
            display.innerText = (perc >= 0 ? '+' : '') + perc + '%';
            document.getElementById('platter-' + deck).style.animationDuration = (3.3 / val) + 's';
        }

        function nudge(deck, amount) {
            const p = (deck === 'A' ? playerA : playerB);
            const currentBase = (deck === 'A' ? basePitchA : basePitchB);
            p.setPlaybackRate(currentBase + amount);
        }

        function updateMixer() {
            const x = document.getElementById('xfader').value;
            const fA = document.getElementById('faderA').value;
            const fB = document.getElementById('faderB').value;
            let vA = Math.min(100, (100 - x) * 2) * (fA / 100);
            let vB = Math.min(100, x * 2) * (fB / 100);
            playerA.setVolume(vA); playerB.setVolume(vB);
        }

        function siren(on) {
            if (on) {
                if(audioCtx.state === 'suspended') audioCtx.resume();
                sirenOsc = audioCtx.createOscillator();
                let g = audioCtx.createGain();
                sirenOsc.type = 'square';
                sirenOsc.frequency.setValueAtTime(400, audioCtx.currentTime);
                sirenOsc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.2);
                sirenOsc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.4);
                sirenOsc.loop = true; g.gain.value = 0.1;
                sirenOsc.connect(g); g.connect(audioCtx.destination);
                sirenOsc.start();
            } else if (sirenOsc) { sirenOsc.stop(); sirenOsc = null; }
        }

        function playSample(t) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.frequency.setValueAtTime(t === 'horn' ? 150 : 1800, audioCtx.currentTime);
            o.start(); o.stop(audioCtx.currentTime + 0.5);
        }

        function unlock() { document.getElementById('overlay').style.display='none'; audioCtx.resume(); }
    </script>
</body>
</html>
