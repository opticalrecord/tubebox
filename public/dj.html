<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUTUBOX DJ - FLAT CONSOLE</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --amber: #ffb000; --bg: #050505; --panel: #111; --silver: #cccccc; --led-off: #111; }
        * { box-sizing: border-box; outline: none; }
        body { background: var(--bg); color: var(--amber); font-family: 'VT323', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* RICERCA */
        .search-container { width: 100%; max-width: 1200px; background: #0a0a0a; padding: 10px 15px; border: 1px solid #222; display: flex; gap: 15px; margin-bottom: 15px; }
        input[type=text] { flex: 1; background: transparent; border: none; color: #fff; font-family: 'VT323'; font-size: 1.5rem; }
        .btn-search { background: var(--amber); border: none; padding: 0 40px; font-family: 'VT323'; font-weight: bold; font-size: 1.3rem; cursor: pointer; }

        #search-results { width: 100%; max-width: 1200px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; min-height: 195px; }
        .result-card { background: #0d0d0d; border: 1px solid #222; padding: 12px; height: 90px; display: flex; flex-direction: column; justify-content: space-between; }
        .nav-panel { border: 2px solid var(--amber); display: flex; align-items: center; justify-content: center; gap: 15px; }
        .nav-btn { background: transparent; border: none; color: var(--amber); font-family: 'VT323'; font-size: 4rem; cursor: pointer; }

        /* DJ SETUP */
        .dj-setup { display: grid; grid-template-columns: 1fr 340px 1fr; gap: 20px; background: #080808; padding: 40px; border: 2px solid #1a1a1a; width: 100%; max-width: 1200px; }
        
        /* DECK LAYOUT */
        .deck { background: var(--panel); padding: 20px; border: 1px solid #222; display: flex; align-items: center; justify-content: center; gap: 20px; }
        .deck-center { display: flex; flex-direction: column; align-items: center; width: 180px; }

        /* SLIDERS FLAT */
        .slider-track-v { position: relative; width: 40px; height: 180px; background: #000; border: 1px solid #222; display: flex; justify-content: center; }
        .v-label { position: absolute; top: -20px; font-size: 0.8rem; color: #555; text-align: center; width: 100%; }

        .custom-slider-v { 
            appearance: none; background: transparent; transform: rotate(-90deg); 
            width: 180px; height: 40px; cursor: pointer; position: absolute; top: 70px; z-index: 5; margin: 0;
        }
        /* Cursore Piatto Argento */
        .custom-slider-v::-webkit-slider-thumb { 
            appearance: none; width: 40px; height: 35px; background: var(--silver); border-radius: 0; border: none;
        }

        /* MIXER */
        .mixer { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .logo-group { text-align: center; margin-bottom: 15px; }
        .logo-sub { font-size: 5.5rem; color: var(--amber); font-weight: bold; line-height: 0.8; margin: 0; }
        
        .vu-container { width: 100%; background: #000; padding: 10px; border: 1px solid #222; margin-bottom: 15px; }
        .vu-row { display: flex; gap: 2px; height: 8px; margin: 4px 0; }
        .led { flex: 1; background: var(--led-off); }

        #xfader { width: 100%; appearance: none; height: 10px; background: #000; border: 1px solid #222; margin-top: 30px; }
        #xfader::-webkit-slider-thumb { appearance: none; width: 50px; height: 35px; background: var(--silver); border-radius: 0; cursor: pointer; }

        .platter { width: 160px; height: 160px; border-radius: 50%; border: 6px solid #000; background-size: cover; background-position: center; animation: spin 3.33s linear infinite; animation-play-state: paused; }
        .platter.playing { animation-play-state: running; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .btn-play { width: 100%; padding: 12px; background: #1a1a1a; color: #444; border: 1px solid #333; cursor: pointer; font-family: 'VT323'; font-size: 1.3rem; margin-top: 15px; }
        .btn-play.active { color: #0f0; border-color: #0f0; }

        .yt-hidden { position: absolute; top: -9999px; left: -9999px; }
        #overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
    </style>
</head>
<body>

    <div id="overlay" onclick="unlock()">
        <h1>YOUTUBOX DJ</h1>
        <p>[ CLICK TO START SYSTEM ]</p>
    </div>

    <div class="search-container">
        <input type="text" id="query" placeholder="CERCA TRACCIA...">
        <button class="btn-search" onclick="search()">CERCA</button>
    </div>

    <div id="search-results"></div>

    <div class="dj-setup">
        <div class="deck">
            <div class="slider-track-v">
                <div class="v-label">PITCH</div>
                <input type="range" id="pitchA" class="custom-slider-v" min="0.9" max="1.1" step="0.01" value="1.0" oninput="updatePitch('A')">
            </div>
            <div class="deck-center">
                <div id="title-A" style="font-size:0.7rem; color:#0f0; background:#000; width:100%; padding:4px; text-align:center; margin-bottom:10px; height:22px; overflow:hidden;">A - READY</div>
                <div id="platter-A" class="platter"></div>
                <button id="btn-play-A" class="btn-play" onclick="toggleDeck('A')">START</button>
            </div>
        </div>

        <div class="mixer">
            <div class="logo-group">
                <div style="letter-spacing:8px; font-size:1rem; color:#fff;">YOUTUBOX</div>
                <div class="logo-sub">DJ</div>
            </div>
            <div class="vu-container"><div class="vu-row" id="vu-L"></div><div class="vu-row" id="vu-R"></div></div>
            <div style="display:flex; gap:30px;">
                <div class="slider-track-v">
                    <div class="v-label">VOL A</div>
                    <input type="range" id="faderA" class="custom-slider-v" min="0" max="100" value="100" oninput="updateMixer()">
                </div>
                <div class="slider-track-v">
                    <div class="v-label">VOL B</div>
                    <input type="range" id="faderB" class="custom-slider-v" min="0" max="100" value="100" oninput="updateMixer()">
                </div>
            </div>
            <input type="range" id="xfader" min="0" max="100" value="50" oninput="updateMixer()">
        </div>

        <div class="deck">
            <div class="deck-center">
                <div id="title-B" style="font-size:0.7rem; color:#0f0; background:#000; width:100%; padding:4px; text-align:center; margin-bottom:10px; height:22px; overflow:hidden;">B - READY</div>
                <div id="platter-B" class="platter"></div>
                <button id="btn-play-B" class="btn-play" onclick="toggleDeck('B')">START</button>
            </div>
            <div class="slider-track-v">
                <div class="v-label">PITCH</div>
                <input type="range" id="pitchB" class="custom-slider-v" min="0.9" max="1.1" step="0.01" value="1.0" oninput="updatePitch('B')">
            </div>
        </div>
    </div>

    <div class="yt-hidden"><div id="playerA"></div><div id="playerB"></div></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let playerA, playerB, searchResults = [], currentPage = 0;

        function onYouTubeIframeAPIReady() {
            playerA = new YT.Player('playerA', { events: { 'onStateChange': (e) => syncUI('A', e.data) } });
            playerB = new YT.Player('playerB', { events: { 'onStateChange': (e) => syncUI('B', e.data) } });
        }

        async function search() {
            const q = document.getElementById('query').value;
            if(!q) return;
            const res = await fetch('/search?q=' + encodeURIComponent(q));
            searchResults = await res.json();
            currentPage = 0;
            renderPage();
        }

        function renderPage() {
            const container = document.getElementById('search-results');
            const start = currentPage * 5;
            const currentSet = searchResults.slice(start, start + 5);
            let html = '';
            for(let i=0; i<5; i++) {
                if(currentSet[i]) {
                    const t = currentSet[i].title.replace(/'/g, "\\'");
                    html += `<div class="result-card">
                        <div style="font-size:0.7rem; color:#fff; height:35px; overflow:hidden;">${currentSet[i].title}</div>
                        <div style="display:flex; gap:5px;">
                            <button style="flex:1; background:#222; color:var(--amber); border:1px solid #333; font-family:'VT323'; cursor:pointer;" onclick="load('${currentSet[i].id}', '${t}', 'A')">LOAD A</button>
                            <button style="flex:1; background:#222; color:var(--amber); border:1px solid #333; font-family:'VT323'; cursor:pointer;" onclick="load('${currentSet[i].id}', '${t}', 'B')">LOAD B</button>
                        </div>
                    </div>`;
                } else { html += `<div class="result-card" style="opacity:0.1; border-style:dashed;">---</div>`; }
            }
            const canNext = (currentPage + 1) * 5 < searchResults.length;
            html += `<div class="result-card nav-panel">
                <button class="nav-btn" onclick="changePage(-1)" ${currentPage === 0 ? 'disabled' : ''}>&lt;</button>
                <div style="font-size:2rem; color:#fff;">${currentPage + 1}</div>
                <button class="nav-btn" onclick="changePage(1)" ${!canNext ? 'disabled' : ''}>&gt;</button>
            </div>`;
            container.innerHTML = html;
        }

        function changePage(dir) { currentPage += dir; renderPage(); }

        function load(id, title, deck) {
            const p = (deck === 'A' ? playerA : playerB);
            if(p && p.cueVideoById) {
                p.cueVideoById(id);
                document.getElementById('title-' + deck).innerText = title.toUpperCase();
                document.getElementById('platter-' + deck).style.backgroundImage = `url('https://img.youtube.com/vi/${id}/hqdefault.jpg')`;
            }
        }

        function updatePitch(deck) {
            const p = (deck === 'A' ? playerA : playerB);
            const rate = parseFloat(document.getElementById('pitch' + deck).value);
            if(p && p.setPlaybackRate) p.setPlaybackRate(rate);
        }

        function toggleDeck(deck) {
            const p = (deck === 'A' ? playerA : playerB);
            if(p && p.getPlayerState) p.getPlayerState() === 1 ? p.pauseVideo() : p.playVideo();
        }

        function syncUI(deck, state) {
            const platter = document.getElementById('platter-' + deck);
            const btn = document.getElementById('btn-play-' + deck);
            state === 1 ? (platter.classList.add('playing'), btn.classList.add('active')) : (platter.classList.remove('playing'), btn.classList.remove('active'));
        }

        function updateMixer() {
            if(!playerA || !playerB) return;
            const x = document.getElementById('xfader').value / 100;
            const volA = document.getElementById('faderA').value; 
            const volB = document.getElementById('faderB').value;
            if(playerA.setVolume) playerA.setVolume(volA * Math.min(1, (1-x)*2));
            if(playerB.setVolume) playerB.setVolume(volB * Math.min(1, x*2));
        }

        function updateVU() {
            const fA = document.getElementById('faderA').value / 100;
            const fB = document.getElementById('faderB').value / 100;
            const x = document.getElementById('xfader').value / 100;
            const isA = (playerA && playerA.getPlayerState && playerA.getPlayerState() === 1) ? 1 : 0;
            const isB = (playerB && playerB.getPlayerState && playerB.getPlayerState() === 1) ? 1 : 0;
            let master = (isA * fA * Math.min(1, (1-x)*2) + isB * fB * Math.min(1, x*2)) * (Math.sin(Date.now() * 0.015) * 0.2 + 0.8);
            ['vu-L', 'vu-R'].forEach((id, idx) => {
                const leds = document.getElementById(id).querySelectorAll('.led');
                const level = (idx === 0 ? master : master * 0.95) * 30;
                leds.forEach((l, i) => { l.style.background = i < level ? (i < 18 ? '#0f0' : (i < 25 ? '#ff0' : '#f00')) : 'var(--led-off)'; });
            });
            requestAnimationFrame(updateVU);
        }

        function unlock() { 
            document.getElementById('overlay').style.display = 'none';
            ['vu-L', 'vu-R'].forEach(id => { document.getElementById(id).innerHTML = Array(30).fill('<div class="led"></div>').join(''); });
            updateVU();
            document.getElementById('faderA').value = 100;
            document.getElementById('faderB').value = 100;
            updateMixer(); 
        }
    </script>
</body>
</html>
