<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUTUBOX DJ - PROFESSIONAL CONSOLE</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --amber: #ffb000; --bg: #050505; --panel: #0a0a0a; --silver: #cccccc; --led-off: #111; }
        * { box-sizing: border-box; outline: none; }
        body { background: var(--bg); color: var(--amber); font-family: 'VT323', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* BARRA DI RICERCA CON LOADING LENTO */
        .search-container { 
            width: 100%; max-width: 1200px; background: #000; padding: 10px 15px; 
            border: 1px solid #222; display: flex; gap: 15px; margin-bottom: 15px; 
            position: relative; overflow: hidden; 
        }
        .search-container.loading::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 176, 0, 0.2), transparent);
            animation: scan 2.5s infinite ease-in-out;
        }
        @keyframes scan { 0% { left: -100%; } 100% { left: 150%; } }

        input[type=text] { flex: 1; background: transparent; border: none; color: #fff; font-family: 'VT323'; font-size: 1.5rem; }
        .btn-search { background: var(--amber); border: none; padding: 0 40px; font-family: 'VT323'; font-weight: bold; font-size: 1.3rem; cursor: pointer; }

        /* RISULTATI CON FADE-IN */
        #search-results { 
            width: 100%; max-width: 1200px; display: grid; 
            grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; min-height: 250px; 
        }
        .result-card { 
            background: #0d0d0d; border: 1px solid #222; padding: 12px; height: 90px; 
            display: flex; flex-direction: column; justify-content: space-between;
            animation: fadeIn 0.5s ease forwards; opacity: 0;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .load-btn { flex: 1; background: #1a1a1a; color: var(--amber); border: 1px solid #333; font-family: 'VT323'; cursor: pointer; font-size: 0.9rem; }
        .load-btn:hover { background: #222; border-color: var(--amber); }

        /* PAGINAZIONE ORIZZONTALE */
        .nav-panel { 
            grid-column: 1 / -1; display: flex; align-items: center; justify-content: center; 
            gap: 15px; padding: 10px; border: 1px solid #222; background: #080808; 
        }
        .page-link { cursor: pointer; font-size: 1.4rem; color: #444; padding: 0 5px; }
        .page-link.active { color: var(--amber); text-decoration: underline; }
        .page-link:hover { color: #fff; }

        /* DJ SETUP */
        .dj-setup { 
            display: grid; grid-template-columns: 1fr 340px 1fr; gap: 20px; 
            background: #000; padding: 40px; border: 1px solid #1a1a1a; width: 100%; max-width: 1200px; 
        }
        
        .deck { background: var(--panel); padding: 20px; border: 1px solid #151515; display: flex; align-items: center; justify-content: center; gap: 20px; }
        .deck-center { display: flex; flex-direction: column; align-items: center; width: 180px; }

        /* SLIDERS FLAT (NO OMBRE) */
        .slider-track-v { position: relative; width: 45px; height: 180px; background: #000; border: 1px solid #222; display: flex; justify-content: center; }
        .v-label { position: absolute; top: -22px; font-size: 0.8rem; color: #444; text-align: center; width: 100%; }
        .val-pitch { position: absolute; bottom: -22px; font-size: 0.8rem; color: #444; }

        .custom-slider-v { 
            appearance: none; background: transparent; transform: rotate(-90deg); 
            width: 180px; height: 45px; cursor: pointer; position: absolute; top: 67px; z-index: 5; margin: 0;
        }
        .custom-slider-v::-webkit-slider-thumb { 
            appearance: none; width: 45px; height: 35px; background: var(--silver); border-radius: 0; border: none; 
        }

        /* MIXER & VU-METER */
        .mixer { display: flex; flex-direction: column; align-items: center; }
        .logo-sub { font-size: 5rem; color: var(--amber); font-weight: bold; line-height: 0.8; margin-bottom: 20px; }
        
        .vu-container { width: 100%; background: #000; padding: 8px; border: 1px solid #222; margin-bottom: 20px; }
        .vu-row { display: flex; gap: 2px; height: 6px; margin: 3px 0; }
        .led { flex: 1; background: var(--led-off); }

        #xfader { width: 100%; appearance: none; height: 12px; background: #000; border: 1px solid #222; margin-top: 40px; }
        #xfader::-webkit-slider-thumb { appearance: none; width: 55px; height: 35px; background: var(--silver); border-radius: 0; cursor: pointer; }

        /* PIATTI */
        .platter { 
            width: 160px; height: 160px; border-radius: 50%; border: 10px solid #111; 
            background-size: cover; background-position: center; 
            animation: spin 3.33s linear infinite; animation-play-state: paused; 
        }
        .platter.playing { animation-play-state: running; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .btn-play { width: 100%; padding: 10px; background: #111; color: #444; border: 1px solid #222; cursor: pointer; font-family: 'VT323'; font-size: 1.2rem; margin-top: 15px; }
        .btn-play.active { color: #0f0; border-color: #0f0; background: #051505; }

        .yt-hidden { position: absolute; top: -9999px; left: -9999px; }
        #overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
    </style>
</head>
<body>

    <div id="overlay" onclick="unlock()">
        <h1 style="font-size: 4rem; margin:0;">YOUTUBOX DJ</h1>
        <p>[ CLICK TO INITIALIZE SYSTEM ]</p>
    </div>

    <div class="search-container" id="search-bar">
        <input type="text" id="query" placeholder="CERCA TRACCIA..." onkeypress="if(event.key==='Enter') search()">
        <button class="btn-search" onclick="search()">CERCA</button>
    </div>

    <div id="search-results"></div>

    <div class="dj-setup">
        <div class="deck">
            <div class="slider-track-v">
                <div class="v-label">PITCH</div>
                <input type="range" id="pitchA" class="custom-slider-v" min="0.9" max="1.1" step="0.01" value="1.0" oninput="updatePitch('A')">
                <div class="val-pitch" id="valA">1.00x</div>
            </div>
            <div class="deck-center">
                <div id="title-A" style="font-size:0.7rem; color:#0f0; background:#000; width:100%; padding:4px; text-align:center; margin-bottom:10px; height:22px; overflow:hidden; border:1px solid #111;">A - STANDBY</div>
                <div id="platter-A" class="platter"></div>
                <button id="btn-play-A" class="btn-play" onclick="toggleDeck('A')">START / STOP</button>
            </div>
        </div>

        <div class="mixer">
            <div class="logo-sub">DJ</div>
            <div class="vu-container"><div class="vu-row" id="vu-L"></div><div class="vu-row" id="vu-R"></div></div>
            <div style="display:flex; gap:40px;">
                <div class="slider-track-v">
                    <div class="v-label">VOL A</div>
                    <input type="range" id="faderA" class="custom-slider-v" min="0" max="100" value="100" oninput="updateMixer()">
                </div>
                <div class="slider-track-v">
                    <div class="v-label">VOL B</div>
                    <input type="range" id="faderB" class="custom-slider-v" min="0" max="100" value="100" oninput="updateMixer()">
                </div>
            </div>
            <input type="range" id="xfader" min="0" max="100" value="50" oninput="updateMixer()">
        </div>

        <div class="deck">
            <div class="deck-center">
                <div id="title-B" style="font-size:0.7rem; color:#0f0; background:#000; width:100%; padding:4px; text-align:center; margin-bottom:10px; height:22px; overflow:hidden; border:1px solid #111;">B - STANDBY</div>
                <div id="platter-B" class="platter"></div>
                <button id="btn-play-B" class="btn-play" onclick="toggleDeck('B')">START / STOP</button>
            </div>
            <div class="slider-track-v">
                <div class="v-label">PITCH</div>
                <input type="range" id="pitchB" class="custom-slider-v" min="0.9" max="1.1" step="0.01" value="1.0" oninput="updatePitch('B')">
                <div class="val-pitch" id="valB">1.00x</div>
            </div>
        </div>
    </div>

    <div class="yt-hidden"><div id="playerA"></div><div id="playerB"></div></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let playerA, playerB, searchResults = [], currentPage = 0;

        function onYouTubeIframeAPIReady() {
            playerA = new YT.Player('playerA', { events: { 'onStateChange': (e) => syncUI('A', e.data) } });
            playerB = new YT.Player('playerB', { events: { 'onStateChange': (e) => syncUI('B', e.data) } });
        }

        async function search() {
            const bar = document.getElementById('search-bar');
            const q = document.getElementById('query').value;
            if(!q) return;
            bar.classList.add('loading');
            try {
                const res = await fetch('/search?q=' + encodeURIComponent(q));
                searchResults = await res.json();
                currentPage = 0;
                renderPage();
            } catch(e) { console.error(e); }
            finally { setTimeout(() => bar.classList.remove('loading'), 1000); }
        }

        function renderPage() {
            const container = document.getElementById('search-results');
            const start = currentPage * 5;
            const currentSet = searchResults.slice(start, start + 5);
            const totalPages = Math.ceil(searchResults.length / 5);
            
            let html = '';
            for(let i=0; i<5; i++) {
                if(currentSet[i]) {
                    const t = currentSet[i].title.replace(/'/g, "\\'");
                    html += `<div class="result-card" style="animation-delay: ${i*0.1}s">
                        <div style="font-size:0.75rem; color:#fff; height:35px; overflow:hidden;">${currentSet[i].title}</div>
                        <div style="display:flex; gap:5px;">
                            <button class="load-btn" onclick="load('${currentSet[i].id}', '${t}', 'A')">LOAD A</button>
                            <button class="load-btn" onclick="load('${currentSet[i].id}', '${t}', 'B')">LOAD B</button>
                        </div>
                    </div>`;
                } else { html += `<div class="result-card" style="opacity:0.05; border-style:dashed;">---</div>`; }
            }

            if(searchResults.length > 0) {
                html += `<div class="nav-panel">`;
                html += `<span class="page-link" onclick="changePage(-1)" style="${currentPage===0?'opacity:0.2;pointer-events:none':''}">&lt;</span>`;
                for(let p=0; p<totalPages; p++) {
                    html += `<span class="page-link ${p===currentPage?'active':''}" onclick="goToPage(${p})">${p+1}</span>`;
                }
                html += `<span class="page-link" onclick="changePage(1)" style="${currentPage>=totalPages-1?'opacity:0.2;pointer-events:none':''}">&gt;</span>`;
                html += `</div>`;
            }
            container.innerHTML = html;
        }

        function changePage(dir) { currentPage += dir; renderPage(); }
        function goToPage(p) { currentPage = p; renderPage(); }

        function load(id, title, deck) {
            const p = (deck === 'A' ? playerA : playerB);
            if(p && p.cueVideoById) {
                p.cueVideoById(id);
                document.getElementById('title-' + deck).innerText = title.toUpperCase();
                document.getElementById('platter-' + deck).style.backgroundImage = `url('https://img.youtube.com/vi/${id}/hqdefault.jpg')`;
            }
        }

        function updatePitch(deck) {
            const p = (deck === 'A' ? playerA : playerB);
            const rate = parseFloat(document.getElementById('pitch' + deck).value);
            document.getElementById('val' + deck).innerText = rate.toFixed(2) + 'x';
            if(p && p.setPlaybackRate) p.setPlaybackRate(rate);
        }

        function toggleDeck(deck) {
            const p = (deck === 'A' ? playerA : playerB);
            if(p && p.getPlayerState) p.getPlayerState() === 1 ? p.pauseVideo() : p.playVideo();
        }

        function syncUI(deck, state) {
            const platter = document.getElementById('platter-' + deck);
            const btn = document.getElementById('btn-play-' + deck);
            state === 1 ? (platter.classList.add('playing'), btn.classList.add('active')) : (platter.classList.remove('playing'), btn.classList.remove('active'));
        }

        function updateMixer() {
            if(!playerA || !playerB) return;
            const x = document.getElementById('xfader').value / 100;
            const volA = document.getElementById('faderA').value; 
            const volB = document.getElementById('faderB').value;
            if(playerA.setVolume) playerA.setVolume(volA * Math.min(1, (1-x)*2));
            if(playerB.setVolume) playerB.setVolume(volB * Math.min(1, x*2));
        }

        function updateVU() {
            const fA = document.getElementById('faderA').value / 100;
            const fB = document.getElementById('faderB').value / 100;
            const x = document.getElementById('xfader').value / 100;
            const isA = (playerA && playerA.getPlayerState && playerA.getPlayerState() === 1) ? 1 : 0;
            const isB = (playerB && playerB.getPlayerState && playerB.getPlayerState() === 1) ? 1 : 0;
            let master = (isA * fA * Math.min(1, (1-x)*2) + isB * fB * Math.min(1, x*2)) * (Math.sin(Date.now() * 0.015) * 0.2 + 0.8);
            ['vu-L', 'vu-R'].forEach((id, idx) => {
                const leds = document.getElementById(id).querySelectorAll('.led');
                const level = (idx === 0 ? master : master * 0.95) * 30;
                leds.forEach((l, i) => { l.style.background = i < level ? (i < 18 ? '#0f0' : (i < 25 ? '#ff0' : '#f00')) : 'var(--led-off)'; });
            });
            requestAnimationFrame(updateVU);
        }

        function unlock() { 
            document.getElementById('overlay').style.display = 'none';
            ['vu-L', 'vu-R'].forEach(id => { document.getElementById(id).innerHTML = Array(30).fill('<div class="led"></div>').join(''); });
            updateVU();
            document.getElementById('faderA').value = 100;
            document.getElementById('faderB').value = 100;
            updateMixer(); 
        }
    </script>
</body>
</html>
