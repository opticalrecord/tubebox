<style>
    /* ... (codice precedente) ... */

    .master-vu {
        display: flex;
        flex-direction: column;
        gap: 3px;
        margin-left: 15px;
        background: #000;
        padding: 5px;
        border: 1px solid #333;
        border-radius: 2px;
        width: 100px;
    }
    .vu-channel {
        display: flex;
        gap: 2px;
        height: 6px;
    }
    .vu-led {
        flex: 1;
        background: #1a1a1a; /* LED SPENTO */
        transition: background 0.05s;
    }
    /* Colori LED: Verde -> Giallo -> Rosso */
    .vu-led.active-green { background: #0f0; box-shadow: 0 0 5px #0f0; }
    .vu-led.active-yellow { background: #ff0; box-shadow: 0 0 5px #ff0; }
    .vu-led.active-red { background: #f00; box-shadow: 0 0 5px #f00; }

    /* Layout Logo + VU Meter */
    .header-mixer {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        width: 100%;
        padding: 0 10px;
        position: absolute;
        top: 5px;
    }
</style>

<div class="mixer">
    <div class="header-mixer">
        <div class="dj-logo" style="position: static;">
            <div class="logo-small">YOUTUBOX</div>
            <div class="logo-large">DJ</div>
        </div>
        <div class="master-vu" id="vu-meter">
            <div class="vu-channel" id="vu-L"></div>
            <div class="vu-channel" id="vu-R"></div>
        </div>
    </div>

    <div class="v-faders" style="margin-top: 50px;">
        <input type="range" id="faderA" class="fader-v" min="0" max="100" value="100" oninput="updateMixer()">
        <input type="range" id="faderB" class="fader-v" min="0" max="100" value="100" oninput="updateMixer()">
    </div>
    </div>

<script>
    // ... (variabili esistenti) ...

    // Inizializza i LED del VU Meter
    function initVUMeter() {
        const channels = ['vu-L', 'vu-R'];
        channels.forEach(id => {
            const container = document.getElementById(id);
            for (let i = 0; i < 12; i++) {
                const led = document.createElement('div');
                led.className = 'vu-led';
                container.appendChild(led);
            }
        });
    }

    // Funzione per animare il VU Meter in base allo stato dei player
    function updateVUDynamics() {
        // Calcoliamo un'intensità basata sul volume dei fader e se i player sono in PLAY
        let volA = (playerA && playerA.getPlayerState() === 1) ? document.getElementById('faderA').value : 0;
        let volB = (playerB && playerB.getPlayerState() === 1) ? document.getElementById('faderB').value : 0;
        
        let masterPower = (parseInt(volA) + parseInt(volB)) / 200; // Valore 0-1
        
        // Aggiungiamo un po' di "jitter" (vibrazione) per simulare il segnale musicale
        if (masterPower > 0) {
            drawVU('vu-L', masterPower * (0.8 + Math.random() * 0.4));
            drawVU('vu-R', masterPower * (0.8 + Math.random() * 0.4));
        } else {
            drawVU('vu-L', 0);
            drawVU('vu-R', 0);
        }
        
        requestAnimationFrame(updateVUDynamics);
    }

    function drawVU(id, level) {
        const leds = document.getElementById(id).querySelectorAll('.vu-led');
        const count = Math.floor(level * leds.length);
        
        leds.forEach((led, i) => {
            led.className = 'vu-led'; // Reset
            if (i < count) {
                if (i < 7) led.classList.add('active-green');
                else if (i < 10) led.classList.add('active-yellow');
                else led.classList.add('active-red');
            }
        });
    }

    // Chiamata all'inizializzazione
    initVUMeter();
    updateVUDynamics();

    // Modifica la funzione unlock() per assicurarti che parta tutto
    function unlock() { 
        document.getElementById('overlay').style.display='none'; 
        if(audioCtx.state === 'suspended') audioCtx.resume();
    }
</script>
