<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>YOUTUBOX PLAYER (TOP VIEW)</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --amber: #ffb000; --amber-dim: #946600; }
        body { background: #050505; color: var(--amber); font-family: 'VT323', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .radio-case { width: 360px; height: 720px; background: #1a1a1a; border: 8px solid #111; border-radius: 20px; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; position: relative; }
        .display-lcd { background: #111; border: 3px solid #333; padding: 15px; border-radius: 5px; margin-bottom: 20px; min-height: 100px; }
        #title { font-size: 1.7rem; text-transform: uppercase; margin: 0; white-space: nowrap; overflow: hidden; }
        
        /* Visualizer Vista dall'Alto */
        .visualizer { height: 260px; display: flex; justify-content: center; align-items: center; background: #0c0c0c; border-radius: 10px; margin-bottom: 20px; position: relative; }
        
        .disc { 
            width: 210px; height: 210px; border-radius: 50%; border: 4px solid var(--amber); 
            position: relative; animation: spin 5s linear infinite; animation-play-state: paused;
            background-size: cover; background-position: center;
            box-shadow: 0 0 20px rgba(255, 176, 0, 0.3);
            /* Foro centrale */
            -webkit-mask-image: radial-gradient(circle at center, transparent 8%, black 9%);
            mask-image: radial-gradient(circle at center, transparent 8%, black 9%);
        }
        
        /* La rotazione ora è solo sull'asse Z (piana) */
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn { background: #222; border: 1px solid #444; color: var(--amber); padding: 12px; font-family: 'VT323'; font-size: 1.2rem; cursor: pointer; border-radius: 4px; }
        .playlist { flex-grow: 1; overflow-y: auto; font-size: 1rem; border-top: 1px solid var(--amber-dim); padding-top: 10px; }
        .p-item { display: flex; justify-content: space-between; margin-bottom: 4px; opacity: 0.5; }
        .p-item.active { opacity: 1; font-weight: bold; }
        #yt-player { position: absolute; top: -5000px; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    </style>
</head>
<body>
    <div id="overlay" onclick="unlock()"><h1 style="border:2px solid var(--amber); padding:20px;">ON / OFF</h1></div>
    <div class="radio-case">
        <div class="display-lcd">
            <div style="font-size: 0.8rem; opacity: 0.6;">PLAYING:</div>
            <div id="title">STANDBY</div>
        </div>
        <div class="visualizer">
            <div id="disc" class="disc"></div>
        </div>
        <div class="controls">
            <button class="btn" onclick="toggle()">PLAY/PAUSE</button>
            <button class="btn" onclick="next()">SKIP >></button>
        </div>
        <div class="playlist" id="player-playlist"></div>
        <div id="yt-player"></div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const socket = io();
        let player, ready = false, currentId = null;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                events: {
                    'onReady': () => { ready = true; if(currentId) load(currentId); },
                    'onStateChange': (e) => {
                        if (e.data === YT.PlayerState.ENDED) socket.emit('next-track');
                        document.getElementById('disc').style.animationPlayState = (e.data === 1) ? 'running' : 'paused';
                    }
                }
            });
        }

        socket.on('play-song', (song) => {
            if (!song) return;
            document.getElementById('title').innerText = song.title;
            if(song.image) document.getElementById('disc').style.backgroundImage = `url('${song.image}')`;
            currentId = song.id;
            if(ready) load(song.id);
        });

        socket.on('update-queue', (data) => {
            const list = document.getElementById('player-playlist');
            const disc = document.getElementById('disc');
            const queue = data.list;
            
            // Effetto schiacciamento piano (ridimensionamento invece che prospettiva)
            const size = Math.max(120, 210 - (queue.length * 8));
            disc.style.width = size + 'px';
            disc.style.height = size + 'px';

            list.innerHTML = queue.map((s, i) => `
                <div class="p-item ${i === 0 ? 'active' : ''}">
                    <span>${i+1}. ${s.title.substring(0,22)}</span>
                    <span>${i === 0 ? 'LIVE' : s.duration}</span>
                </div>
            `).join('');
        });

        function load(id) { player.loadVideoById(id); player.playVideo(); }
        function toggle() { if(player.getPlayerState() === 1) player.pauseVideo(); else player.playVideo(); }
        function next() { socket.emit('next-track'); }
        function unlock() { document.getElementById('overlay').style.display='none'; if(ready && currentId) player.playVideo(); }
    </script>
</body>
</html>
