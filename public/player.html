<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>YOUTUBOX PLAYER</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --amber: #ffb000; }
        body { background: #050505; color: var(--amber); font-family: 'VT323', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .radio-case { width: 360px; height: 720px; background: #1a1a1a; border: 8px solid #111; border-radius: 20px; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .display-lcd { background: #111; border: 3px solid #333; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        #title { font-size: 1.7rem; text-transform: uppercase; white-space: nowrap; overflow: hidden; }
        .visualizer { height: 260px; display: flex; justify-content: center; align-items: center; background: #0c0c0c; border-radius: 10px; margin-bottom: 20px; }
        .disc { width: 210px; height: 210px; border-radius: 50%; border: 4px solid var(--amber); animation: spin 5s linear infinite; animation-play-state: paused; background-size: cover; background-position: center; -webkit-mask-image: radial-gradient(circle at center, transparent 8%, black 9%); mask-image: radial-gradient(circle at center, transparent 8%, black 9%); }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn { background: #222; border: 1px solid #444; color: var(--amber); padding: 12px; font-family: 'VT323'; font-size: 1.2rem; cursor: pointer; }
        .playlist { flex-grow: 1; overflow-y: auto; font-size: 1rem; border-top: 1px solid #444; padding-top: 10px; }
        #yt-player { position: absolute; top: -5000px; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    </style>
</head>
<body>
    <div id="overlay" onclick="unlock()"><h1 style="border:2px solid var(--amber); padding:20px;">START SYSTEM</h1></div>
    <div class="radio-case">
        <div class="display-lcd"><div id="title">STANDBY</div></div>
        <div class="visualizer"><div id="disc" class="disc"></div></div>
        <div class="controls">
            <button class="btn" onclick="toggle()">P/P</button>
            <button class="btn" onclick="next()">SKIP >></button>
        </div>
        <div class="playlist" id="player-playlist"></div>
        <div id="yt-player"></div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const socket = io();
        let player, ready = false, currentId = null;

        // INVIO LIVELLO AUDIO AL SERVER OGNI 100MS
        setInterval(() => {
            if (player && player.getPlayerState() === 1) {
                const level = Math.floor(Math.random() * 50) + 30; // Simulazione dinamica
                socket.emit('audio-level', level);
            } else {
                socket.emit('audio-level', 0);
            }
        }, 120);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                events: {
                    'onReady': () => { ready = true; if(currentId) load(currentId); },
                    'onStateChange': (e) => {
                        if (e.data === YT.PlayerState.ENDED) socket.emit('next-track');
                        document.getElementById('disc').style.animationPlayState = (e.data === 1) ? 'running' : 'paused';
                    }
                }
            });
        }

        socket.on('play-song', (song) => {
            if (!song) return;
            document.getElementById('title').innerText = song.title;
            if(song.image) document.getElementById('disc').style.backgroundImage = `url('${song.image}')`;
            currentId = song.id;
            if(ready) load(song.id);
        });

        socket.on('update-queue', (data) => {
            const list = document.getElementById('player-playlist');
            const disc = document.getElementById('disc');
            const size = Math.max(100, 210 - (data.list.length * 7));
            disc.style.width = size + 'px'; disc.style.height = size + 'px';
            list.innerHTML = data.list.map((s, i) => `
                <div style="display:flex;justify-content:space-between;opacity:${i===0?1:0.5}">
                    <span>${i+1}. ${s.title.substring(0,20)}</span><span>${i===0?'LIVE':s.duration}</span>
                </div>`).join('');
        });

        function load(id) { player.loadVideoById(id); player.playVideo(); }
        function toggle() { if(player.getPlayerState() === 1) player.pauseVideo(); else player.playVideo(); }
        function next() { socket.emit('next-track'); }
        function unlock() { document.getElementById('overlay').style.display='none'; if(ready && currentId) player.playVideo(); }
    </script>
</body>
</html>
