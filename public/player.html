<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>YOUTUBOX PLAYER</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #ffb000; font-family: 'VT323', monospace; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .radio-case { width: 360px; height: 720px; background: #1a1a1a; border: 8px solid #111; border-radius: 20px; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .display-lcd { background: #111; border: 3px solid #333; padding: 15px; border-radius: 5px; margin-bottom: 20px; min-height: 80px; }
        #title { font-size: 1.6rem; text-transform: uppercase; white-space: nowrap; overflow: hidden; }
        .visualizer { height: 260px; display: flex; justify-content: center; align-items: center; background: #0c0c0c; border-radius: 10px; margin-bottom: 20px; }
        .disc { width: 210px; height: 210px; border-radius: 50%; border: 4px solid #ffb000; animation: spin 5s linear infinite; animation-play-state: paused; background-size: cover; background-position: center; -webkit-mask-image: radial-gradient(circle, transparent 10%, black 11%); }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn { background: #222; border: 1px solid #444; color: #ffb000; padding: 15px; font-family: 'VT323'; font-size: 1.2rem; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        .btn:active { background: #333; transform: scale(0.98); }
        
        .playlist { flex-grow: 1; overflow-y: auto; font-size: 1rem; border-top: 1px solid #333; padding-top: 10px; opacity: 0.8; }
        #yt-player { position: absolute; top: -5000px; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    </style>
</head>
<body>
    <div id="overlay" onclick="unlock()"><h1 style="border:2px solid #ffb000; padding:20px;">START SYSTEM</h1></div>
    <div class="radio-case">
        <div class="display-lcd"><div id="title">READY...</div></div>
        <div class="visualizer"><div id="disc" class="disc"></div></div>
        
        <div class="controls">
            <button class="btn" onclick="toggle()">PLAY/PAUSE</button>
            <button class="btn" onclick="next()">NEXT >></button>
        </div>

        <div class="playlist" id="player-playlist"></div>
        <div id="yt-player"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const socket = io();
        let player, ready = false, currentId = null;

        setInterval(() => {
            if (player && player.getPlayerState() === 1) {
                socket.emit('audio-level', Math.floor(Math.random() * 50) + 30);
                const remaining = Math.floor(player.getDuration() - player.getCurrentTime());
                socket.emit('time-left', remaining);
            } else { socket.emit('audio-level', 0); }
        }, 200);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                events: {
                    'onReady': () => { ready = true; if(currentId) load(currentId); },
                    'onStateChange': (e) => {
                        if (e.data === YT.PlayerState.ENDED) socket.emit('next-track');
                        document.getElementById('disc').style.animationPlayState = (e.data === 1) ? 'running' : 'paused';
                    }
                }
            });
        }

        socket.on('play-song', (song) => {
            if (!song) return;
            document.getElementById('title').innerText = song.title;
            if(song.image) document.getElementById('disc').style.backgroundImage = `url('${song.image}')`;
            currentId = song.id; if(ready) load(song.id);
        });

        socket.on('update-queue', (data) => {
            const list = data.list || [];
            document.getElementById('player-playlist').innerHTML = list.map((s,i) => `
                <div style="display:flex;justify-content:space-between;opacity:${i===0?1:0.5}">
                    <span>${i+1}. ${s.title.substring(0,20)}</span><span>${i===0?'NOW':s.duration}</span>
                </div>`).join('');
        });

        function load(id) { player.loadVideoById(id); player.playVideo(); }
        function toggle() { if(player.getPlayerState() === 1) player.pauseVideo(); else player.playVideo(); }
        function next() { socket.emit('next-track'); }
        function unlock() { document.getElementById('overlay').style.display='none'; if(ready && currentId) player.playVideo(); }
    </script>
</body>
</html>
