<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>AMBER-RADIO PLAYER</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --amber: #ffb000; --amber-dim: #946600; }
        body { background: #050505; color: var(--amber); font-family: 'VT323', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .radio-case { width: 360px; height: 720px; background: #1a1a1a; border: 8px solid #111; border-radius: 20px; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; box-shadow: inset 0 0 50px #000, 0 20px 50px rgba(0,0,0,0.8); position: relative; }
        .display-lcd { background: #111; border: 3px solid #333; padding: 15px; border-radius: 5px; box-shadow: inset 0 0 15px #000; margin-bottom: 20px; min-height: 100px; }
        #title { font-size: 1.7rem; text-transform: uppercase; margin: 0; white-space: nowrap; overflow: hidden; text-shadow: 0 0 10px var(--amber); }
        .visualizer { height: 240px; display: flex; justify-content: center; align-items: center; perspective: 600px; background: #0c0c0c; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .disc { width: 200px; height: 200px; border-radius: 50%; border: 4px solid var(--amber); position: relative; animation: spin 4s linear infinite; animation-play-state: paused; box-shadow: 0 0 30px var(--amber-dim); background-size: cover; background-position: center; -webkit-mask-image: radial-gradient(circle at center, transparent 10%, black 11%); mask-image: radial-gradient(circle at center, transparent 10%, black 11%); }
        @keyframes spin { from { transform: rotateX(60deg) rotateZ(0deg); } to { transform: rotateX(60deg) rotateZ(360deg); } }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn { background: #222; border: 1px solid #444; color: var(--amber); padding: 12px; font-family: 'VT323'; font-size: 1.2rem; cursor: pointer; border-radius: 4px; box-shadow: 0 4px 0 #000; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #000; }
        .playlist { flex-grow: 1; overflow-y: auto; font-size: 1rem; border-top: 1px solid var(--amber-dim); padding-top: 10px; }
        .p-item { display: flex; justify-content: space-between; margin-bottom: 4px; opacity: 0.5; }
        .p-item.active { opacity: 1; font-weight: bold; }
        .p-item.next { color: #fff; text-shadow: 0 0 5px var(--amber); opacity: 1; }
        #yt-player { position: absolute; top: -5000px; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    </style>
</head>
<body>
    <div id="overlay" onclick="unlock()"><h1 style="border:2px solid var(--amber); padding:20px;">ACCENDI RADIO</h1></div>
    <div class="radio-case">
        <div class="display-lcd">
            <div style="font-size: 0.8rem; opacity: 0.6;">NOW PLAYING:</div>
            <div id="title">RADIO OFF</div>
            <div id="status-wait" style="font-size: 0.9rem; margin-top: 5px; color: #fff;"></div>
        </div>
        <div class="visualizer"><div id="disc" class="disc"></div></div>
        <div class="controls">
            <button class="btn" onclick="toggle()">PAUSE/PLAY</button>
            <button class="btn" onclick="next()">SKIP >></button>
        </div>
        <div class="playlist" id="player-playlist"></div>
        <div id="yt-player"></div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const socket = io();
        let player, ready = false, currentId = null;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                events: {
                    'onReady': () => { ready = true; if(currentId) load(currentId); },
                    'onStateChange': (e) => {
                        if (e.data === YT.PlayerState.ENDED) socket.emit('next-track');
                        document.getElementById('disc').style.animationPlayState = (e.data === 1) ? 'running' : 'paused';
                    }
                }
            });
        }

        socket.on('play-song', (song) => {
            if (!song) return;
            document.getElementById('title').innerText = song.title;
            if(song.image) document.getElementById('disc').style.backgroundImage = `url('${song.image}')`;
            currentId = song.id;
            if(ready) load(song.id);
        });

        socket.on('update-queue', (data) => {
            const list = document.getElementById('player-playlist');
            const disc = document.getElementById('disc');
            const queue = data.list;
            
            // Effetto schiacciamento
            const factor = Math.max(0.15, 1 - (queue.length * 0.08));
            disc.style.transform = `rotateX(60deg) scaleY(${factor})`;

            list.innerHTML = queue.map((s, i) => {
                let info = s.duration;
                let className = 'p-item';
                if(i === 0) className += ' active';
                if(i === 1) { className += ' next'; info = 'NEXT'; }
                return `<div class="${className}"><span>${i+1}. ${s.title.substring(0,22)}</span><span>${info}</span></div>`;
            }).join('');
        });

        function load(id) { player.loadVideoById(id); player.playVideo(); }
        function toggle() { if(player.getPlayerState() === 1) player.pauseVideo(); else player.playVideo(); }
        function next() { socket.emit('next-track'); }
        function unlock() { document.getElementById('overlay').style.display='none'; if(ready && currentId) player.playVideo(); }
    </script>
</body>
</html>
