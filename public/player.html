<script>
    const socket = io();
    let player, ready = false, currentId = null;

    // Ciclo di invio dati (Audio + Tempo)
    setInterval(() => {
        if (player && player.getPlayerState() === 1) { // 1 = playing
            // 1. Invia livello audio per VU-meter (simulato ma reattivo al play)
            const level = Math.floor(Math.random() * 60) + 20;
            socket.emit('audio-level', level);

            // 2. Invia tempo rimanente per il Countdown del telecomando
            const remaining = Math.floor(player.getDuration() - player.getCurrentTime());
            socket.emit('time-left', remaining);
        } else {
            socket.emit('audio-level', 0);
        }
    }, 200);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            events: {
                'onReady': () => { ready = true; if(currentId) load(currentId); },
                'onStateChange': (e) => {
                    if (e.data === YT.PlayerState.ENDED) socket.emit('next-track');
                    document.getElementById('disc').style.animationPlayState = (e.data === 1) ? 'running' : 'paused';
                }
            }
        });
    }

    socket.on('play-song', (song) => {
        if (!song) return;
        document.getElementById('title').innerText = song.title;
        if(song.image) document.getElementById('disc').style.backgroundImage = `url('${song.image}')`;
        currentId = song.id;
        if(ready) load(song.id);
    });

    // ... (restanti funzioni load, toggle, next, unlock come prima)
</script>
