<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUBEBOX REMOTE</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #f0f; font-family: 'VT323', monospace; margin: 0; display: flex; justify-content: center; }
        .phone-frame { width: 100%; max-width: 400px; height: 100vh; background: #080808; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; }
        .pixel-title { font-size: 3rem; text-align: center; color: #f0f; text-shadow: 3px 3px 0 #440044; margin: 10px 0; }
        .search-box { display: flex; gap: 8px; margin-bottom: 15px; }
        input { flex: 1; background: #000; border: 2px solid #0ff; color: #0ff; padding: 12px; font-family: 'VT323'; font-size: 1.2rem; outline: none; }
        .btn-search { background: #0ff; border: none; padding: 10px 15px; font-family: 'VT323'; font-size: 1.1rem; cursor: pointer; font-weight: bold; }
        #results { flex: 1; overflow-y: auto; border-bottom: 2px dashed #333; margin-bottom: 15px; }
        .song-card { border: 1px solid #0ff; padding: 10px; margin-bottom: 10px; cursor: pointer; color: #0ff; }
        .playlist-title { color: #f0f; font-size: 1.4rem; border-bottom: 1px solid #f0f; margin-bottom: 10px; }
        .playlist-area { height: 180px; overflow-y: auto; }
        .q-item { display: flex; justify-content: space-between; color: #aaa; margin-bottom: 5px; }
        #toast { position: fixed; top: -50px; left: 50%; transform: translateX(-50%); background: #f0f; color: #000; padding: 10px 20px; transition: 0.5s; z-index: 100; font-weight: bold; }
        #toast.active { top: 20px; }
    </style>
</head>
<body>
    <div id="toast">BRANO AGGIUNTO!</div>
    <div class="phone-frame">
        <div class="pixel-title">TUBEBOX</div>
        <div class="search-box">
            <input type="text" id="term" placeholder="CERCA CANZONE...">
            <button class="btn-search" onclick="doSearch()">CERCA</button>
        </div>
        <div id="results"></div>
        <div class="playlist-title">PROSSIMI BRANI:</div>
        <div id="playlist" class="playlist-area"></div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const resDiv = document.getElementById('results');
        const playDiv = document.getElementById('playlist');

        async function doSearch() {
            const q = document.getElementById('term').value;
            if(!q) return;
            resDiv.innerHTML = "<div style='color:#0ff'>RICERCA...</div>";
            const r = await fetch('/search?q=' + encodeURIComponent(q));
            const data = await r.json();
            resDiv.innerHTML = "";
            data.forEach(s => {
                const div = document.createElement('div');
                div.className = 'song-card';
                div.innerText = `${s.title} [${s.duration}]`;
                div.onclick = () => {
                    socket.emit('add-to-queue', { id: s.id, title: s.title, seconds: s.seconds });
                    const t = document.getElementById('toast');
                    t.className = "active";
                    setTimeout(() => t.className = "", 2000);
                };
                resDiv.appendChild(div);
            });
        }

        socket.on('update-queue', (queue) => {
            let wait = 0;
            playDiv.innerHTML = queue.map((s, i) => {
                const row = `<div class="q-item">
                    <span>${i+1}. ${s.title.substring(0,18)}</span>
                    <span style="color:#0ff">${i === 0 ? 'LIVE' : 'T-' + Math.floor(wait/60) + 'm'}</span>
                </div>`;
                wait += s.seconds;
                return row;
            }).join('');
        });
    </script>
</body>
</html>
