<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YOUTUBOX REMOTE</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: #ffb000; font-family: 'VT323', monospace; margin: 0; display: flex; justify-content: center; }
        .remote-case { width: 100%; max-width: 400px; height: 100vh; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; }
        .status-bar { background: #1a1100; border: 1px solid #ffb000; padding: 10px; margin-bottom: 15px; text-align: center; }
        #eta { font-size: 2.2rem; color: #fff; font-weight: bold; }
        .title-container { display: flex; align-items: center; justify-content: center; margin: 15px 0; font-size: 2.8rem; font-weight: bold; letter-spacing: 1px; }
        .vu-meter-o { width: 32px; height: 32px; border: 3px solid #ffb000; border-radius: 50%; position: relative; margin: 0 4px; background: #111; display: flex; align-items: center; justify-content: center; top: 4px; }
        .needle { width: 2px; height: 16px; background: #ffb000; transform-origin: bottom center; transform: rotate(-45deg); transition: transform 0.1s; position: absolute; bottom: 50%; }
        .search-box { display: flex; gap: 5px; margin-bottom: 20px; }
        input { flex: 1; background: #111; border: 2px solid #ffb000; color: #ffb000; padding: 12px; font-family: 'VT323'; font-size: 1.2rem; outline: none; }
        button { background: #ffb000; border: none; padding: 10px 15px; font-family: 'VT323'; font-weight: bold; color: #000; cursor: pointer; }
        #results { flex: 1; overflow-y: auto; margin-bottom: 15px; border-bottom: 1px dashed #333; }
        .song-card { border: 1px solid #444; padding: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; cursor: pointer; }
        .playlist-area { height: 120px; overflow-y: auto; opacity: 0.7; font-size: 0.9rem; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="remote-case">
        <div class="status-bar">
            <div style="font-size: 0.8rem; opacity: 0.8;">FINE BRANO TRA:</div>
            <div id="eta">00:00</div>
        </div>
        <div class="title-container">
            Y<div class="vu-meter-o"><div id="vu-1" class="needle"></div></div>UTUB<div class="vu-meter-o"><div id="vu-2" class="needle"></div></div>X
        </div>
        <div class="search-box">
            <input type="text" id="term" placeholder="CERCA UN BRANO...">
            <button onclick="doSearch()">OK</button>
        </div>
        <div id="results"></div>
        <div style="font-size: 0.8rem; border-bottom: 1px solid #ffb000;">CODA DI RIPRODUZIONE:</div>
        <div id="playlist" class="playlist-area"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        // Ricezione movimento VU-Meter
        socket.on('vibe-check', (level) => {
            const a1 = (level - 45) + (Math.random() * 15);
            const a2 = (level - 45) + (Math.random() * 15);
            document.getElementById('vu-1').style.transform = `rotate(${a1}deg)`;
            document.getElementById('vu-2').style.transform = `rotate(${a2}deg)`;
        });

        // Ricezione Countdown reale
        socket.on('sync-countdown', (sec) => {
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            document.getElementById('eta').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        });

        async function doSearch() {
            const q = document.getElementById('term').value;
            if(!q) return;
            document.getElementById('results').innerHTML = "SEARCHING...";
            const r = await fetch('/search?q=' + encodeURIComponent(q));
            const data = await r.json();
            document.getElementById('results').innerHTML = "";
            data.forEach(s => {
                const div = document.createElement('div');
                div.className = 'song-card';
                div.innerHTML = `<span>${s.title}</span><span>${s.duration}</span>`;
                div.onclick = () => { socket.emit('add-to-queue', s); };
                document.getElementById('results').appendChild(div);
            });
        }

        socket.on('update-queue', (data) => {
            const list = data.list || [];
            document.getElementById('playlist').innerHTML = list.map((s,i) => `
                <div style="display:flex; justify-content:space-between; margin-bottom:5px; opacity:${i===0?1:0.5}">
                    <span>${i+1}. ${s.title.substring(0,25)}</span>
                    <span>${i===0 ? 'NOW' : s.duration}</span>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
