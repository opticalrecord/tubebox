<script>
    const socket = io();
    let countdownInterval;

    function formatTime(seconds) {
        if (seconds < 0) return "00:00";
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    // RICEZIONE VU-METER
    socket.on('vibe-check', (level) => {
        const a1 = (level - 40) + (Math.random() * 10);
        const a2 = (level - 40) + (Math.random() * 10);
        document.getElementById('vu-1').style.transform = `rotate(${a1}deg)`;
        document.getElementById('vu-2').style.transform = `rotate(${a2}deg)`;
    });

    // RICEZIONE COUNTDOWN REALE DAL PLAYER
    socket.on('sync-countdown', (seconds) => {
        document.getElementById('eta').innerText = formatTime(seconds);
    });

    async function doSearch() {
        const q = document.getElementById('term').value;
        if(!q) return;
        document.getElementById('results').innerHTML = "SEARCHING...";
        const r = await fetch('/search?q=' + encodeURIComponent(q));
        const data = await r.json();
        document.getElementById('results').innerHTML = "";
        data.forEach(s => {
            const div = document.createElement('div');
            div.className = 'song-card';
            div.innerHTML = `<span>${s.title}</span><span>${s.duration}</span>`;
            div.onclick = () => { socket.emit('add-to-queue', s); };
            document.getElementById('results').appendChild(div);
        });
    }

    socket.on('update-queue', (data) => {
        document.getElementById('playlist').innerHTML = (data.list || []).map((s,i) => `
            <div style="display:flex; justify-content:space-between; margin-bottom:3px; opacity:${i===0?1:0.5}">
                <span>${i+1}. ${s.title.substring(0,25)}</span>
                <span>${i===0 ? 'NOW' : s.duration}</span>
            </div>
        `).join('');
    });
</script>
