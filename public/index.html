<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YOUTUBOX REMOTE</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: #ffb000; font-family: 'VT323', monospace; margin: 0; display: flex; justify-content: center; }
        .remote-case { width: 100%; max-width: 400px; height: 100vh; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; }
        
        /* Titolo con DOPPIO VU-Meter integrato */
        .title-container { 
            display: flex; align-items: center; justify-content: center; margin: 15px 0; font-size: 3rem; font-weight: bold; 
            letter-spacing: 1px;
        }
        
        .vu-meter-o {
            width: 32px; height: 32px; border: 3px solid #ffb000; border-radius: 50%;
            position: relative; margin: 0 4px; display: inline-flex; align-items: center; justify-content: center;
            background: #111; top: 4px; /* Allineamento ottico con le lettere */
        }
        .needle {
            width: 2px; height: 16px; background: #ffb000;
            transform-origin: bottom center;
            transform: rotate(-45deg);
            transition: transform 0.12s ease-out;
            position: absolute; bottom: 50%;
        }

        .status-bar { background: #1a1100; border: 1px solid #ffb000; padding: 10px; margin-bottom: 15px; border-radius: 4px; text-align: center; }
        #eta { font-size: 1.5rem; color: #fff; font-weight: bold; }

        .search-box { display: flex; gap: 5px; margin-bottom: 20px; }
        input { flex: 1; background: #111; border: 2px solid #ffb000; color: #ffb000; padding: 12px; font-family: 'VT323'; font-size: 1.2rem; outline: none; }
        button { background: #ffb000; border: none; padding: 10px 15px; font-family: 'VT323'; font-weight: bold; cursor: pointer; color: #000; }
        
        #results { flex: 1; overflow-y: auto; border-bottom: 1px dashed #444; margin-bottom: 15px; }
        .song-card { border: 1px solid #444; padding: 10px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .song-card:active { background: #ffb000; color: #000; }
        
        .playlist-area { height: 120px; overflow-y: auto; opacity: 0.7; font-size: 0.9rem; }
        #toast { position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%); background: #ffb000; color: #000; padding: 10px 30px; transition: 0.4s; z-index: 1000; font-weight: bold; border: 1px solid #fff; }
        #toast.show { bottom: 20px; }
    </style>
</head>
<body>
    <div id="toast">IN CODA...</div>
    <div class="remote-case">
        <div class="status-bar">
            <div style="font-size: 0.7rem; opacity: 0.8;">ATTESA STIMATA:</div>
            <div id="eta">00:00</div>
        </div>

        <div class="title-container">
            Y<div class="vu-meter-o"><div id="vu-needle-1" class="needle"></div></div>UTUB<div class="vu-meter-o"><div id="vu-needle-2" class="needle"></div></div>X
        </div>
        
        <div class="search-box">
            <input type="text" id="term" placeholder="CERCA UN BRANO...">
            <button onclick="doSearch()">CERCA</button>
        </div>
        <div id="results"></div>
        <div style="font-size: 0.8rem; margin-bottom: 5px; border-bottom: 1px solid #ffb000;">PROSSIME TRACCE:</div>
        <div id="playlist" class="playlist-area"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        // Animazione Stereo delle lancette nelle due "O"
        setInterval(() => {
            const angle1 = Math.floor(Math.random() * 70) - 35;
            const angle2 = Math.floor(Math.random() * 70) - 35;
            document.getElementById('vu-needle-1').style.transform = `rotate(${angle1}deg)`;
            document.getElementById('vu-needle-2').style.transform = `rotate(${angle2}deg)`;
        }, 140);

        async function doSearch() {
            const q = document.getElementById('term').value;
            if(!q) return;
            document.getElementById('results').innerHTML = "RICERCA...";
            const r = await fetch('/search?q=' + encodeURIComponent(q));
            const data = await r.json();
            document.getElementById('results').innerHTML = "";
            data.forEach(s => {
                const div = document.createElement('div');
                div.className = 'song-card';
                div.innerHTML = `<span>${s.title}</span><span style="font-size:0.8rem;">${s.duration}</span>`;
                div.onclick = () => {
                    socket.emit('add-to-queue', s);
                    const t = document.getElementById('toast');
                    t.classList.add('show');
                    setTimeout(() => t.classList.remove('show'), 2000);
                };
                document.getElementById('results').appendChild(div);
            });
        }

        socket.on('update-queue', (data) => {
            const min = Math.floor(data.totalWait / 60);
            const sec = data.totalWait % 60;
            document.getElementById('eta').innerText = `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
            document.getElementById('playlist').innerHTML = (data.list || []).map((s,i) => `
                <div style="display:flex; justify-content:space-between; margin-bottom:3px;">
                    <span>${i+1}. ${s.title.substring(0,25)}</span>
                    <span style="color:${i===0?'#fff':'#ffb000'}">${i===0?'LIVE':s.duration}</span>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
